<body data-page="alerts">
  <header class="site-header" id="site-header"></header>
  <div id="alertBar"></div>

  <section class="page-hero section tight">
    <div class="container">
      <span class="eyebrow" data-i18n="al.eyebrow"></span>
      <h1 data-i18n="al.h1"></h1>
      <p class="lead" data-i18n="al.sub"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="form-card reveal" style="margin-bottom:28px">
        <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
          <div class="icon" style="margin:0;flex:0 0 50px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
          <div style="flex:1 1 280px">
            <h2 style="margin:0 0 6px" data-i18n="push.title"></h2>
            <p style="margin:0 0 14px;color:var(--ink-soft)" data-i18n="push.desc"></p>
            <button type="button" id="pushToggle" class="btn btn-primary" aria-pressed="false" data-i18n="push.enable"></button>
            <p id="pushStatus" class="muted" style="font-size:.85rem;margin:10px 0 0"></p>
          </div>
        </div>
      </div>

      <div class="grid cols-2" style="gap:36px;align-items:start">
        <div class="form-card">
          <h2 style="margin-top:0" data-i18n="al.form.t"></h2>
          <div class="form-success" id="formSuccess" data-i18n="al.success"></div>
          <form id="alertForm" novalidate>
            <div class="field">
              <label for="f-name" data-i18n="al.name"></label>
              <input id="f-name" name="name" type="text" data-i18n-placeholder="al.name.ph" />
            </div>
            <div class="form-grid">
              <div class="field">
                <label for="f-mobile" data-i18n="al.mobile"></label>
                <input id="f-mobile" name="mobile" type="tel" data-i18n-placeholder="al.mobile.ph" />
              </div>
              <div class="field">
                <label for="f-email" data-i18n="al.email"></label>
                <input id="f-email" name="email" type="email" data-i18n-placeholder="al.email.ph" />
              </div>
            </div>
            <div class="field">
              <label for="f-district" data-i18n="al.district"></label>
              <input id="f-district" name="district" type="text" data-i18n-placeholder="al.district.ph" />
            </div>
            <div class="form-grid">
              <div class="field">
                <label for="f-lang" data-i18n="al.lang"></label>
                <select id="f-lang" name="lang">
                  <option value="ne" data-i18n="al.lang.ne"></option>
                  <option value="en" data-i18n="al.lang.en"></option>
                </select>
              </div>
              <div class="field">
                <label for="f-thresh" data-i18n="al.thresh"></label>
                <select id="f-thresh" name="threshold">
                  <option value="4.0">M 4.0+</option>
                  <option value="4.5" selected>M 4.5+</option>
                  <option value="5.0">M 5.0+</option>
                  <option value="6.0">M 6.0+</option>
                </select>
                <div class="hint" data-i18n="al.thresh.help"></div>
              </div>
            </div>
            <div class="field" style="display:flex;gap:10px;align-items:flex-start">
              <input id="f-consent" name="consent" type="checkbox" style="width:auto;margin-top:5px" />
              <label for="f-consent" style="font-weight:500;color:var(--ink-soft)" data-i18n="al.consent"></label>
            </div>
            <div id="formError" class="callout danger" style="display:none;margin-bottom:14px">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0z"/></svg>
              <p id="formErrorMsg"></p>
            </div>
            <button type="submit" class="btn btn-danger" style="width:100%;justify-content:center" data-i18n="al.submit"></button>
          </form>
        </div>

        <div>
          <h2 data-i18n="al.why.t"></h2>
          <div class="grid" style="gap:14px">
            <div class="card" style="display:flex;gap:14px;align-items:flex-start">
              <div class="icon" style="margin:0;flex:0 0 50px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
              <div><h3 data-i18n="al.why1.t"></h3><p class="mb-0" data-i18n="al.why1.d"></p></div>
            </div>
            <div class="card" style="display:flex;gap:14px;align-items:flex-start">
              <div class="icon" style="margin:0;flex:0 0 50px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg></div>
              <div><h3 data-i18n="al.why2.t"></h3><p class="mb-0" data-i18n="al.why2.d"></p></div>
            </div>
            <div class="card" style="display:flex;gap:14px;align-items:flex-start">
              <div class="icon" style="margin:0;flex:0 0 50px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg></div>
              <div><h3 data-i18n="al.why3.t"></h3><p class="mb-0" data-i18n="al.why3.d"></p></div>
            </div>
          </div>
          <div class="callout" style="margin-top:16px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            <p data-i18n="al.note"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/push.js"></script>
  <script src="assets/js/pages/alerts-form.js"></script>
  <script src="assets/js/mydistrict.js"></script>
</body>
