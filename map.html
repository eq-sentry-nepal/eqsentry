<body data-page="map" data-eqdata>
  <header class="site-header" id="site-header"></header>

  <div class="map-layout">
    <div id="map"></div>
    <aside class="map-side">
      <div class="map-controls">
        <h1 style="font-size:1.1rem;margin:0 0 14px;display:flex;align-items:center;gap:10px">
          <span data-i18n="map.h1"></span> <span class="badge live" data-i18n="map.live">LIVE</span>
        </h1>

        <p class="ctrl-label" data-i18n="map.src"></p>
        <div class="seg" id="segSource">
          <button data-value="live" data-i18n="src.live"></button>
          <button data-value="emsc" data-i18n="src.emsc"></button>
          <button data-value="catalog" class="active" data-i18n="src.catalog"></button>
          <button data-value="notable" data-i18n="src.notable"></button>
        </div>

        <div id="regionGroup">
          <p class="ctrl-label" data-i18n="map.region"></p>
          <div class="seg" id="segRegion">
            <button data-value="nepal" class="active" data-i18n="map.r.nepal"></button>
            <button data-value="south" data-i18n="map.r.south"></button>
            <button data-value="world" data-i18n="map.r.world"></button>
          </div>
        </div>

        <div id="liveGroup">
          <div class="row">
            <div>
              <p class="ctrl-label" data-i18n="map.period"></p>
              <div class="seg" id="segPeriod">
                <button data-value="day" data-i18n="map.p.day"></button>
                <button data-value="week" class="active" data-i18n="map.p.week"></button>
              </div>
            </div>
            <div>
              <p class="ctrl-label" data-i18n="map.minmag"></p>
              <div class="seg" id="segMag">
                <button data-value="2.5" class="active" data-i18n="map.b25"></button>
                <button data-value="4.5" data-i18n="map.b45"></button>
              </div>
            </div>
          </div>
        </div>

        <div id="filterGroup">
          <p class="ctrl-label" data-i18n="map.daterange"></p>
          <div class="date-row">
            <label class="date-field"><span data-i18n="map.from"></span><input type="date" id="dateFrom" /></label>
            <label class="date-field"><span data-i18n="map.to"></span><input type="date" id="dateTo" /></label>
          </div>
          <div class="seg presets" id="segPreset">
            <button data-value="all" class="active" data-i18n="map.dp.all"></button>
            <button data-value="1y" data-i18n="map.dp.1y"></button>
            <button data-value="10y" data-i18n="map.dp.10y"></button>
            <button data-value="2015" data-i18n="map.dp.2015"></button>
          </div>
          <p class="ctrl-label" data-i18n="map.filtermag"></p>
          <div class="seg" id="segFmag">
            <button data-value="0" class="active" data-i18n="map.mm.all"></button>
            <button data-value="5" data-i18n="map.b5"></button>
            <button data-value="6" data-i18n="map.b6"></button>
            <button data-value="7" data-i18n="map.b7"></button>
          </div>
        </div>

        <p class="ctrl-label" data-i18n="map.layers"></p>
        <div class="seg" id="layerToggles">
          <button id="btnHeat" data-i18n="map.heatmap"></button>
          <button id="btnPlates" data-i18n="map.plates"></button>
        </div>

        <p id="srcNote" class="muted" style="font-size:.78rem;margin:12px 0 0;line-height:1.45"></p>
        <button class="btn btn-outline" id="btnNearMe" style="width:100%;margin-top:14px;justify-content:center" data-i18n="map.nearme"></button>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-outline" id="btnShare" style="flex:1;justify-content:center;font-size:.82rem;padding:.55rem .6rem" data-i18n="map.share"></button>
          <button class="btn btn-outline" id="btnFull" style="flex:1;justify-content:center;font-size:.82rem;padding:.55rem .6rem" data-i18n="map.full"></button>
        </div>
      </div>

      <div class="map-status" id="mapStatus"></div>
      <div class="quake-list" id="quakeList"></div>
      <div class="legend">
        <span><i style="background:#34D399"></i><span data-i18n="leg.minor"></span></span>
        <span><i style="background:#FBBF24"></i><span data-i18n="leg.light"></span></span>
        <span><i style="background:#FB923C"></i><span data-i18n="leg.moderate"></span></span>
        <span><i style="background:#F97316"></i><span data-i18n="leg.strong"></span></span>
        <span><i style="background:#EF4444"></i><span data-i18n="leg.major"></span></span>
      </div>
    </aside>
  </div>

  <section class="section tight">
    <div class="container">
      <div class="grid cols-2" style="gap:28px;align-items:start">
        <div class="reveal">
          <h2 style="font-size:1.5rem;margin-top:0" data-i18n="map.about.t"></h2>
          <p data-i18n="map.about.p"></p>
        </div>
        <div class="callout info reveal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <p data-i18n="map.note"></p>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
