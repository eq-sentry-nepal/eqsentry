<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; connect-src https://earthquake.usgs.gov; base-uri 'self'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>EQ Sentry — embed</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --bg:#0d1117; --ink:#e8edf2; --soft:#9aa3af; --line:#2a3038; --accent:#FF4D2E; }
    .light { --bg:#ffffff; --ink:#0f172a; --soft:#5b6672; --line:#e2e8f0; }
    * { box-sizing:border-box; margin:0; }
    body { background:var(--bg); color:var(--ink); font:13px/1.45 system-ui, "Noto Sans Devanagari", sans-serif; padding:10px 12px; }
    .eqw-head { display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; padding-bottom:8px; border-bottom:1px solid var(--line); }
    .eqw-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:p 1.8s infinite; }
    @keyframes p { 0%{box-shadow:0 0 0 0 rgba(255,77,46,.5);} 70%{box-shadow:0 0 0 7px rgba(255,77,46,0);} 100%{box-shadow:0 0 0 0 rgba(255,77,46,0);} }
    .eqw-row { display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid var(--line); text-decoration:none; color:var(--ink); }
    .eqw-m { flex:0 0 40px; text-align:center; font-weight:800; border-radius:7px; padding:3px 0; color:#fff; font-size:12px; }
    .eqw-p { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .eqw-t { flex:0 0 auto; color:var(--soft); font-size:11px; }
    .eqw-foot { display:flex; justify-content:space-between; padding-top:8px; font-size:11px; color:var(--soft); }
    .eqw-foot a { color:var(--accent); text-decoration:none; font-weight:600; }
    .eqw-empty { padding:14px 0; color:var(--soft); text-align:center; }
  </style>
</head>
<body>
  <div class="eqw-head"><span class="eqw-dot"></span><span id="eqwTitle">Recent earthquakes — Nepal region</span></div>
  <div id="eqwList"><div class="eqw-empty" id="eqwEmpty">…</div></div>
  <div class="eqw-foot"><span id="eqwUpd"></span><a id="eqwLink" href="https://eq-sentry-nepal.github.io/eqsentry/map.html" target="_blank" rel="noopener">EQ Sentry →</a></div>
  <script src="assets/js/embed.js"></script>
</body>
</html>
