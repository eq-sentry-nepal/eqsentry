<body data-page="status">
  <header class="site-header" id="site-header"></header>
  <div id="alertBar"></div>

  <section class="page-hero section tight">
    <div class="container">
      <span class="eyebrow" data-i18n="st.eyebrow"></span>
      <h1 data-i18n="st.h1"></h1>
      <p class="lead" data-i18n="st.sub"></p>

      <div class="up-head">
        <div class="seg" id="stPeriod">
          <button data-value="hour" data-i18n="st.p.hour"></button>
          <button data-value="day" class="active" data-i18n="st.p.day"></button>
          <button data-value="month" data-i18n="st.p.month"></button>
        </div>
        <div class="up-overall">
          <div class="up-big"><b id="upPct">—</b><span class="up-lbl" data-i18n="st.up.t"></span></div>
          <div class="up-big"><b id="upNow" class="wait" data-i18n="st.ov.wait"></b><span class="up-lbl"><span data-i18n="st.up.now"></span> · <span data-i18n="st.last"></span> <span id="stWhen">—</span></span></div>
          <button type="button" class="btn btn-outline" id="stRecheck" style="font-size:.82rem;padding:.5rem .9rem" data-i18n="st.recheck"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- 24/7 cloud monitor -->
  <section class="section" style="padding-top:6px">
    <div class="container">
      <div class="card" style="padding:18px 22px" id="cmCard">
        <div class="up-rowhead" style="margin-bottom:10px">
          <b data-i18n="cm.t"></b>
          <span class="up-detail" id="cmWhen"></span>
          <span class="up-pct" id="cmState"></span>
        </div>
        <div id="cmBars"></div>
        <p class="muted" id="cmNote" style="font-size:.82rem;margin:8px 0 0" data-i18n="cm.pending"></p>
        <div style="margin-top:14px">
          <b style="font-size:.92rem" data-i18n="cm.incidents"></b>
          <p class="muted" id="cmErrNone" style="font-size:.85rem;margin:6px 0 0" data-i18n="cm.none"></p>
          <div class="table-wrap st-scroll" style="margin-top:8px" id="cmErrWrap" hidden>
            <table class="st-log">
              <thead><tr><th data-i18n="lg.time"></th><th data-i18n="cm.check"></th><th data-i18n="cm.detail"></th></tr></thead>
              <tbody id="cmErrBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Uptime bar rows -->
  <section class="section" style="padding-top:6px">
    <div class="container">
      <div class="card" style="padding:10px 22px 16px" id="upRows"></div>
      <div class="up-legend">
        <span><i class="ok"></i><span data-i18n="st.leg.ok"></span></span>
        <span><i class="slow"></i><span data-i18n="st.leg.slow"></span></span>
        <span><i class="fail"></i><span data-i18n="st.leg.fail"></span></span>
        <span><i class="na"></i><span data-i18n="st.leg.na"></span></span>
      </div>
      <p class="muted" style="font-size:.78rem;font-family:var(--mono);margin-top:6px" data-i18n="st.leg.note"></p>
    </div>
  </section>

  <!-- Admin: server-side history -->
  <section class="section alt tight">
    <div class="container">
      <div class="card" style="padding:22px">
        <h3 style="margin:0 0 4px" data-i18n="ad.t"></h3>
        <p class="muted" style="font-size:.85rem;margin:0 0 14px" data-i18n="ad.sub"></p>
        <p class="muted" id="adStatic" style="display:none;margin:0" data-i18n="ad.static"></p>
        <div id="adPanel" style="display:none">
          <div class="flex wrap" style="gap:8px;margin-bottom:14px">
            <input type="password" id="adKey" class="dir-search" style="flex:1 1 240px;margin:0" data-i18n-placeholder="ad.key.ph" />
            <button type="button" class="btn btn-primary" id="adConnect" data-i18n="ad.connect"></button>
          </div>
          <p id="adMsg" class="muted" style="font-size:.84rem;margin:0 0 10px"></p>
          <div id="adBars"></div>
          <p class="muted" id="adMeta" style="font-family:var(--mono);font-size:.76rem;margin:8px 0 16px"></p>
          <h4 style="margin:0 0 8px" data-i18n="ad.errors.t"></h4>
          <div class="table-wrap st-scroll"><table class="data st-log">
            <thead><tr><th data-i18n="lg.when"></th><th data-i18n="lg.what"></th><th data-i18n="lg.where"></th></tr></thead>
            <tbody id="adErrBody"></tbody>
          </table></div>
          <p style="color:#34D399;font-size:.88rem;margin:8px 0 0;display:none" id="adErrNone" data-i18n="ad.errors.none"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Device-local full logs -->
  <section class="section tight">
    <div class="container">
      <div class="sec-head left reveal" style="margin-bottom:14px">
        <h2 style="font-size:1.35rem" data-i18n="lg.t"></h2>
        <p class="muted" style="margin:4px 0 0" data-i18n="lg.sub"></p>
      </div>
      <div class="grid cols-2" style="gap:20px;align-items:start">
        <div class="card" style="padding:20px 22px">
          <div class="flex aic" style="justify-content:space-between;gap:10px;margin-bottom:10px">
            <h3 style="margin:0" data-i18n="lg.hist.t"></h3>
            <button type="button" class="btn btn-outline" id="lgExport" style="font-size:.74rem;padding:.4rem .8rem" data-i18n="lg.export"></button>
          </div>
          <div class="table-wrap st-scroll"><table class="data st-log">
            <thead><tr><th data-i18n="lg.time"></th><th data-i18n="lg.overall"></th><th data-i18n="lg.lat"></th><th data-i18n="lg.issues"></th></tr></thead>
            <tbody id="lgHistBody"></tbody>
          </table></div>
          <p class="muted" id="lgHistNone" style="font-size:.84rem;margin:10px 0 0;display:none" data-i18n="lg.none"></p>
        </div>
        <div class="card" style="padding:20px 22px">
