name: CI
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # zero-dependency test — no npm install needed
      - run: node scripts/smoke-test.mjs
