name: Refresh earthquake catalogue
on:
  schedule:
    - cron: "30 0 * * 1"   # every Monday 00:30 UTC (06:15 NPT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update catalogue from USGS
        run: node scripts/update-catalog.mjs
      - name: Smoke test the refreshed data
        run: node scripts/smoke-test.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "eq-sentry-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ assets/js/data-layers.js
          if git diff --cached --quiet; then
            echo "No catalogue changes."
          else
            git commit -m "data: weekly USGS catalogue refresh"
            git push
          fi
