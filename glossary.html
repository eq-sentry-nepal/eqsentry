      "en": {
        "meta.title": "Earthquake Glossary — EQ Sentry Nepal", "meta.desc": "Plain-language earthquake terms in English and Nepali: magnitude vs intensity, epicentre, aftershocks, liquefaction, retrofitting and more.",
        "gl.eyebrow": "Glossary",
        "gl.h1": "Earthquake words, in plain language",
        "gl.sub": "The terms you'll meet in news reports and on this site — what they actually mean.",
        "gl.search.ph": "Filter terms… (e.g. magnitude, aftershock)",
        "gl.none": "No terms match — try another word.",
        "gl.t1": "Magnitude (M)",
        "gl.d1": "The size of the earthquake at its source — the energy released. One scale-step up (M6 → M7) releases about 32× more energy. Every quake has ONE magnitude.",
        "gl.t2": "Intensity (MMI)",
        "gl.d2": "How strongly the shaking was felt at a particular place, on the Modified Mercalli scale (I–XII). One quake has many intensities: severe near the epicentre, weak far away.",
        "gl.t3": "Epicentre",
        "gl.d3": "The point on the ground surface directly above where the earthquake started. Reported locations (e.g. '12 km from Gorkha') refer to this point.",
        "gl.t4": "Hypocentre / focus",
        "gl.d4": "The actual underground spot where the rupture began — the epicentre is just its shadow on the surface.",
        "gl.t5": "Depth",
        "gl.d5": "How far below the surface the quake started. Shallow quakes (under ~30 km, most Himalayan ones) shake the surface harder than deep ones of the same magnitude.",
        "gl.t6": "Fault",
        "gl.d6": "A crack in the Earth's crust where two blocks of rock can slip past each other. Earthquakes ARE that slip — sudden movement on a fault.",
        "gl.t7": "Main Himalayan Thrust (MHT)",
        "gl.d7": "The huge, gently sloping fault under Nepal where the Indian plate slides beneath the Himalaya. Great Himalayan earthquakes, including 2015, rupture parts of it.",
        "gl.t8": "Plate tectonics",
        "gl.d8": "Earth's outer shell is broken into slowly moving plates. India pushes into Eurasia at about 2 cm per year — the collision that builds the Himalaya and loads Nepal's faults.",
        "gl.t9": "P-wave",
        "gl.d9": "The fastest seismic wave (~8 km/s in the crust) — a push-pull pulse you may feel as a sharp jolt or hear as a rumble. It arrives first and carries a warning: stronger waves follow.",
        "gl.t10": "S-wave",
        "gl.d10": "The slower (~4.6 km/s), side-to-side wave that does most of the damage. The gap between P and S arrival grows with distance — a few seconds of head start.",
        "gl.t11": "Aftershock",
        "gl.d11": "A smaller quake following a bigger one nearby, as the crust re-adjusts. They fade with time but can still topple weakened buildings — expect them for weeks after a big event.",
        "gl.t12": "Foreshock",
        "gl.d12": "A quake later recognised as a forerunner of a bigger one. Only known in hindsight — no one can tell in advance whether a quake is a foreshock.",
        "gl.t13": "Liquefaction",
        "gl.d13": "When strong shaking makes loose, wet ground (river plains, old ponds) behave like a liquid, tilting or sinking buildings. A key hazard in the Terai and parts of Kathmandu Valley.",
        "gl.t14": "Retrofitting",
        "gl.d14": "Strengthening an existing building against earthquakes — jacketing columns, adding bands or bracing. Far cheaper than rebuilding after a collapse.",
        "gl.t15": "Seismograph / seismogram",
        "gl.d15": "The instrument that records ground motion, and the wiggly trace it draws. Networks of them locate each quake and measure its magnitude within minutes.",
        "gl.t16": "Early warning",
        "gl.d16": "Systems that detect the P-wave and alert people seconds before strong shaking arrives. Useful seconds — but NOT a prediction: the quake has already begun."
      },
      "ne": {
        "meta.title": "भूकम्प शब्दकोश — EQ Sentry नेपाल", "meta.desc": "म्याग्निच्युड, तीव्रता, P र S तरङ्ग, केन्द्रबिन्दु — भूकम्पका शब्द सरल भाषामा।",
        "gl.eyebrow": "शब्दावली",
        "gl.h1": "भूकम्पका शब्द, सरल भाषामा",
        "gl.sub": "समाचार र यस साइटमा भेटिने शब्दहरू — तिनको वास्तविक अर्थ।",
        "gl.search.ph": "शब्द खोज्नुहोस्… (जस्तै म्याग्निच्युड, पराकम्प)",
        "gl.none": "कुनै शब्द मिलेन — अर्को शब्द प्रयास गर्नुहोस्।",
        "gl.t1": "म्याग्निच्युड (M)",
        "gl.d1": "स्रोतमा भूकम्पको आकार — निस्केको ऊर्जा। एक चरण माथि (M६ → M७) भनेको करिब ३२ गुणा बढी ऊर्जा। हरेक भूकम्पको एउटै म्याग्निच्युड हुन्छ।",
        "gl.t2": "तीव्रता (MMI)",
        "gl.d2": "कुनै ठाउँमा हल्लाइ कति बलियो महसुस भयो — मोडिफाइड मर्कली मापन (I–XII)। एउटै भूकम्पका धेरै तीव्रता हुन्छन्: केन्द्र नजिक गम्भीर, टाढा कमजोर।",
        "gl.t3": "अधिकेन्द्र (एपिसेन्टर)",
        "gl.d3": "भूकम्प सुरु भएको ठाउँ ठ्याक्कै माथिको जमिन सतहको बिन्दु। समाचारमा भनिने स्थान (जस्तै 'गोरखाबाट १२ कि.मी.') यही बिन्दु हो।",
        "gl.t4": "उद्गम केन्द्र (हाइपोसेन्टर)",
        "gl.d4": "जमिनमुनि भ्रंश चिरा फाट्न सुरु भएको वास्तविक ठाउँ — अधिकेन्द्र त्यसको सतहमा परेको छायाँ मात्र हो।",
        "gl.t5": "गहिराइ",
        "gl.d5": "भूकम्प सतहमुनि कति गहिराइमा सुरु भयो। उथ्ला भूकम्पले (~३० कि.मी.भन्दा कम, धेरै हिमालयनहरू) उही म्याग्निच्युडमा सतह बढी हल्लाउँछन्।",
        "gl.t6": "भ्रंश (फल्ट)",
        "gl.d6": "पृथ्वीको पत्रमा भएको चिरा, जहाँ चट्टानका दुई खण्ड चिप्लिन सक्छन्। भूकम्प भनेकै त्यो चिप्लाइ हो — भ्रंशमा हुने अचानक गति।",
        "gl.t7": "मुख्य हिमालयन थ्रस्ट (MHT)",
        "gl.d7": "नेपालमुनिको विशाल, थोरै ढल्केको भ्रंश जहाँ भारतीय प्लेट हिमालयमुनि घुस्रन्छ। २०१५ सहितका ठूला हिमालयन भूकम्प यसकै भाग फाटेर आउँछन्।",
        "gl.t8": "प्लेट टेक्टोनिक्स",
        "gl.d8": "पृथ्वीको बाहिरी खोल बिस्तारै सर्ने प्लेटहरूमा बाँडिएको छ। भारत वर्षको करिब २ से.मी.ले युरेसियातिर धकेलिन्छ — त्यही टकरावले हिमालय बनाउँछ र नेपालका भ्रंश भर्छ।",
        "gl.t9": "P-तरंग",
        "gl.d9": "सबैभन्दा छिटो भूकम्पीय तरंग (~८ कि.मी./से.) — धक्काजस्तो झट्का वा गड्याङ आवाज। पहिले आइपुग्छ र चेतावनी बोक्छ: बलिया तरंग पछि आउँदैछन्।",
        "gl.t10": "S-तरंग",
        "gl.d10": "ढिलो (~४.६ कि.मी./से.) तर दायाँबायाँ हल्लाउने तरंग — धेरैजसो क्षति यसैले गर्छ। P र S बीचको अन्तर दूरीसँगै बढ्छ — केही सेकेन्डको अग्रिम सूचना।",
        "gl.t11": "पराकम्प (आफ्टरसक)",
        "gl.d11": "ठूलो भूकम्पपछि नजिकै आउने साना भूकम्प — पत्र मिलिँदा। समयसँगै घट्छन्, तर कमजोर भवन ढाल्न सक्छन् — ठूलो घटनापछि हप्तौंसम्म अपेक्षा गर्नुहोस्।",
        "gl.t12": "पूर्वकम्प (फोरसक)",
        "gl.d12": "पछि ठूलो भूकम्पको अग्रदूत ठहरिने कम्पन। पछि फर्केर हेर्दा मात्र थाहा हुन्छ — कुनै कम्पन पूर्वकम्प हो कि होइन अग्रिम कसैले भन्न सक्दैन।",
        "gl.t13": "लिक्विफ्याक्सन (भूमि तरलीकरण)",
        "gl.d13": "बलियो हल्लाइले खुकुलो, भिजेको जमिन (नदी मैदान, पुराना पोखरी) तरलजस्तै बनाउँछ — भवन ढल्किन्छन् वा भासिन्छन्। तराई र काठमाडौं उपत्यकाका केही भागको मुख्य जोखिम।",
        "gl.t14": "रेट्रोफिट (सुदृढीकरण)",
        "gl.d14": "बनिसकेको भवनलाई भूकम्पविरुद्ध बलियो बनाउने काम — स्तम्भ ज्याकेटिङ, ब्यान्ड वा ब्रेसिङ। भत्केपछि पुनर्निर्माणभन्दा धेरै सस्तो।",
        "gl.t15": "सिस्मोग्राफ / सिस्मोग्राम",
        "gl.d15": "जमिनको गति टिप्ने यन्त्र, र त्यसले कोर्ने छालदार रेखा। यिनको सञ्जालले मिनेटभित्रै भूकम्पको स्थान र म्याग्निच्युड निकाल्छ।",
        "gl.t16": "पूर्व-चेतावनी",
        "gl.d16": "P-तरंग पत्ता लगाएर बलियो हल्लाइ आउनुअघि केही सेकेन्ड सचेत गराउने प्रणाली। उपयोगी सेकेन्ड — तर पूर्वानुमान होइन: भूकम्प सुरु भइसकेको हुन्छ।"
      }
    }
