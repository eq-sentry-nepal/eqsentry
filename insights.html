<body data-page="insights" data-eqdata>
  <header class="site-header" id="site-header"></header>
  <div id="alertBar"></div>

  <section class="page-hero section tight">
    <div class="container">
      <span class="eyebrow" data-i18n="ins.eyebrow"></span>
      <h1 data-i18n="ins.h1"></h1>
      <p class="lead" data-i18n="ins.sub"></p>
    </div>
  </section>

  <!-- Stats -->
  <section class="section tight">
    <div class="container">
      <div class="stat-row reveal">
        <div class="stat"><div class="num accent" id="stTotal">—</div><div class="lbl" data-i18n="ins.s.total"></div></div>
        <div class="stat"><div class="num" id="stStrong">—</div><div class="lbl"><span data-i18n="ins.s.strong"></span> · <span id="stStrongP" style="color:var(--ink-soft)"></span></div></div>
        <div class="stat"><div class="num" id="stPerYear">—</div><div class="lbl" data-i18n="ins.s.peryear"></div></div>
        <div class="stat"><div class="num" id="stM6">—</div><div class="lbl" data-i18n="ins.s.m6"></div></div>
      </div>
      <p class="muted" style="font-family:var(--mono);font-size:.8rem;margin-top:14px">
        <span data-i18n="ins.records"></span>: <span id="stSpan">—</span> · <span data-i18n="ins.deepest"></span> <span id="stDeep">—</span>
      </p>
    </div>
  </section>

  <!-- Now & then -->
  <section class="section tight">
    <div class="container">
      <div class="sec-head left reveal" style="margin-bottom:18px"><span class="eyebrow" data-i18n="nt.eyebrow"></span></div>
      <div class="grid cols-2" style="gap:20px;align-items:stretch">
        <div class="card reveal" style="padding:22px">
          <h3 style="margin:0 0 8px" data-i18n="nt.month.t"></h3>
          <p id="ntMonth" style="margin:0;color:var(--ink-soft)"><span class="spinner"></span></p>
          <p id="ntAvg" class="muted" style="font-family:var(--mono);font-size:.78rem;margin:10px 0 0"></p>
        </div>
        <div class="card reveal" style="padding:22px">
          <h3 style="margin:0 0 8px" data-i18n="nt.hist.t"></h3>
          <div id="ntHist" style="color:var(--ink-soft)"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Charts -->
  <section class="section" style="padding-top:8px">
    <div class="container">
      <div class="sec-head left reveal" style="margin-bottom:26px">
        <span class="eyebrow" data-i18n="ins.csec"></span>
      </div>
      <div class="chart-card reveal" style="margin-bottom:20px">
        <div class="flex aic wrap" style="justify-content:space-between;gap:12px">
          <div>
            <h3 data-i18n="ins.c.year.t"></h3>
            <div class="csub" data-i18n="ins.c.year.sub"></div>
          </div>
          <div class="chart-controls" id="yearFilter">
            <button class="active" data-min="4.5" data-i18n="ins.f.all"></button>
            <button data-min="5" data-i18n="ins.f.m5"></button>
            <button data-min="6" data-i18n="ins.f.m6"></button>
          </div>
        </div>
        <div class="chart-box tall"><canvas id="chartYear"></canvas></div>
      </div>
      <div class="charts-grid">
        <div class="chart-card reveal">
          <h3 data-i18n="ins.c.mag.t"></h3><div class="csub" data-i18n="ins.c.mag.sub"></div>
          <div class="chart-box"><canvas id="chartMag"></canvas></div>
        </div>
        <div class="chart-card reveal">
          <h3 data-i18n="ins.c.depth.t"></h3><div class="csub" data-i18n="ins.c.depth.sub"></div>
          <div class="chart-box"><canvas id="chartDepth"></canvas></div>
        </div>
      </div>

      <div class="chart-card reveal" style="margin-top:20px">
        <h3 data-i18n="ins.c.energy.t"></h3><div class="csub" data-i18n="ins.c.energy.sub"></div>
        <div class="chart-box tall"><canvas id="chartEnergy"></canvas></div>
      </div>
      <div class="charts-grid" style="margin-top:20px">
        <div class="chart-card reveal">
          <h3 data-i18n="ins.c.gr.t"></h3><div class="csub" data-i18n="ins.c.gr.sub"></div>
          <div class="chart-box"><canvas id="chartGR"></canvas></div>
          <p class="muted" id="grB" style="font-family:var(--mono);font-size:.76rem;margin:10px 0 0"></p>
        </div>
        <div class="chart-card reveal">
          <h3 data-i18n="ins.c.sc.t"></h3><div class="csub" data-i18n="ins.c.sc.sub"></div>
          <div class="chart-box"><canvas id="chartScatter"></canvas></div>
        </div>
      </div>

      <h3 class="reveal" style="margin:34px 0 14px" data-i18n="rec.t"></h3>
      <div class="stat-row reveal" id="recRow">
        <div class="stat"><div class="num" id="recDeep">—</div><div class="lbl"><span data-i18n="rec.deep"></span> · <span id="recDeepP" style="color:var(--ink-soft)"></span></div></div>
        <div class="stat"><div class="num accent" id="recActive">—</div><div class="lbl"><span data-i18n="rec.active"></span> · <span id="recActiveN" style="color:var(--ink-soft)"></span></div></div>
        <div class="stat"><div class="num" id="recQuiet">—</div><div class="lbl"><span data-i18n="rec.quiet"></span> · <span id="recQuietN" style="color:var(--ink-soft)"></span></div></div>
        <div class="stat"><div class="num" id="recGap">—</div><div class="lbl"><span data-i18n="rec.gap"></span> · <span id="recGapP" style="color:var(--ink-soft)"></span></div></div>
      </div>
    </div>
  </section>

  <!-- Aftershock explorer -->
  <section class="section alt">
    <div class="container">
      <div class="sec-head center reveal">
        <span class="eyebrow" data-i18n="as.eyebrow"></span>
        <h2 data-i18n="as.title"></h2>
        <p class="lead" data-i18n="as.sub"></p>
      </div>
      <div class="reveal" style="max-width:420px;margin:0 auto 20px">
        <label class="ctrl-label" for="asPick" data-i18n="as.pick"></label>
        <select id="asPick" class="dir-search" style="width:100%"></select>
      </div>
      <div class="stat-row reveal" style="margin-bottom:18px">
        <div class="stat"><div class="num accent" id="asCount">—</div><div class="lbl" data-i18n="as.s.count"></div></div>
        <div class="stat"><div class="num" id="asBig">—</div><div class="lbl"><span data-i18n="as.s.big"></span> · <span id="asBigP" style="color:var(--ink-soft)"></span></div></div>
        <div class="stat"><div class="num" id="asSpan">—</div><div class="lbl" data-i18n="as.s.span"></div></div>
      </div>
      <div class="chart-card reveal">
        <div class="csub" data-i18n="as.chart"></div>
        <div class="chart-box tall"><canvas id="chartAS"></canvas></div>
        <p class="muted" id="asNone" style="display:none;margin:10px 0 0" data-i18n="as.none"></p>
      </div>
    </div>
  </section>

  <!-- Compare two quakes -->
  <section class="section">
    <div class="container">
      <div class="sec-head center reveal">
        <span class="eyebrow" data-i18n="cmp.eyebrow"></span>
        <h2 data-i18n="cmp.title"></h2>
        <p class="lead" data-i18n="cmp.sub"></p>
      </div>
      <div class="grid cols-2 reveal" style="gap:14px;max-width:760px;margin:0 auto 18px">
        <div><label class="ctrl-label" for="cmpA" data-i18n="cmp.a"></label><select id="cmpA" class="dir-search" style="width:100%"></select></div>
        <div><label class="ctrl-label" for="cmpB" data-i18n="cmp.b"></label><select id="cmpB" class="dir-search" style="width:100%"></select></div>
      </div>
      <div class="card reveal" style="max-width:760px;margin:0 auto;padding:22px">
        <div id="cmpTable"></div>
        <p id="cmpLine" style="margin:14px 0 0;color:var(--ink);font-weight:600"></p>
      </div>
    </div>
  </section>

  <!-- Magnitude explorer -->
  <section class="section alt">
    <div class="container">
      <div class="sec-head center reveal">
        <span class="eyebrow" data-i18n="exp.eyebrow"></span>
        <h2 data-i18n="exp.title"></h2>
        <p class="lead" data-i18n="exp.sub"></p>
      </div>
      <div class="explorer reveal">
        <div class="exp-readout">
          <div class="exp-mag" id="expMag">M7.8</div>
          <div class="exp-class" id="expClass">—</div>
          <div class="exp-bar"><i id="expPtr"></i></div>
          <div class="exp-metrics">
            <div class="m"><div class="mk" data-i18n="exp.m.energy"></div><div class="mv" id="expEnergy">—</div></div>
            <div class="m"><div class="mk" data-i18n="exp.m.tnt"></div><div class="mv" id="expTNT">—</div></div>
            <div class="m"><div class="mk" data-i18n="exp.m.freq"></div><div class="mv" id="expFreq">—</div></div>
          </div>
        </div>
        <div>
          <label class="ctrl-label" data-i18n="exp.drag"></label>
          <input type="range" class="eq-range" id="magSlider" min="4" max="9" step="0.1" value="7.8" />
          <p class="exp-feel" id="expFeel" style="margin-top:14px"></p>
          <p class="exp-eg" id="expEg"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Time machine -->
  <section class="section">
    <div class="container">
      <div class="sec-head center reveal">
        <span class="eyebrow" data-i18n="tm.eyebrow"></span>
        <h2 data-i18n="tm.title"></h2>
        <p class="lead" data-i18n="tm.sub"></p>
      </div>
      <div class="tm-wrap reveal">
        <div id="tmMap"></div>
        <div class="tm-side">
          <div class="tm-year" id="tmYear">2015</div>
          <div class="tm-readout" id="tmReadout">—</div>
          <input type="range" class="eq-range" id="tmYearSlider" min="1911" max="2026" value="2015" />
          <div class="tm-controls">
            <button class="tm-play" id="tmPlay" aria-label="Play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
            <span class="tm-note" data-i18n="tm.note"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Will I feel it? -->
  <section class="section alt">
    <div class="container">
      <div class="sec-head center reveal">
        <span class="eyebrow" data-i18n="fi.eyebrow"></span>
        <h2 data-i18n="fi.title"></h2>
        <p class="lead" data-i18n="fi.sub"></p>
      </div>
      <div class="explorer reveal">
        <div class="exp-readout">
          <div class="exp-mag" id="fiMMI" style="font-size:clamp(2.6rem,7vw,4rem)">—</div>
          <div class="exp-class" id="fiClass">—</div>
          <div class="exp-bar"><i id="fiPtr"></i></div>
          <div class="exp-metrics">
            <div class="m"><div class="mk" data-i18n="fi.mag"></div><div class="mv" id="fiMagV">M7.0</div></div>
            <div class="m"><div class="mk" data-i18n="fi.dist"></div><div class="mv" id="fiDistV">50 km</div></div>
          </div>
        </div>
        <div>
          <label class="ctrl-label" data-i18n="fi.mag"></label>
          <input type="range" class="eq-range" id="fiMag" min="4" max="9" step="0.1" value="7.0" />
          <label class="ctrl-label" style="margin-top:16px;display:block" data-i18n="fi.dist"></label>
          <input type="range" class="eq-range" id="fiDist" min="0" max="300" step="5" value="50" />
          <p class="exp-feel" id="fiFeel" style="margin-top:16px"></p>
          <p class="exp-eg" id="fiEffect"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Learn more: history + glossary -->
  <section class="section alt tight">
    <div class="container">
      <div class="grid cols-2" style="gap:14px">
        <a class="card link-card reveal" href="history.html" style="padding:22px">
          <h3 style="margin:0 0 4px" data-i18n="nav.history"></h3>
          <p class="mb-0" style="color:var(--ink-soft)" data-i18n="nd.history"></p>
          <span class="card-arrow">→</span>
        </a>
        <a class="card link-card reveal" href="glossary.html" style="padding:22px">
          <h3 style="margin:0 0 4px" data-i18n="nav.glossary"></h3>
          <p class="mb-0" style="color:var(--ink-soft)" data-i18n="nd.glossary"></p>
          <span class="card-arrow">→</span>
        </a>
      </div>
    </div>
  </section>

  <!-- Open data downloads -->
  <section class="section tight">
    <div class="container">
      <div class="card reveal" style="padding:26px">
        <div class="grid cols-2" style="gap:22px;align-items:center">
          <div>
            <h2 style="font-size:1.35rem;margin:0 0 6px" data-i18n="dl.title"></h2>
            <p style="color:var(--ink-soft);margin:0" data-i18n="dl.sub"></p>
          </div>
          <div>
            <div class="flex wrap" style="gap:10px">
              <a class="btn btn-outline" href="data/nepal_earthquakes.csv" download data-i18n="dl.csv"></a>
              <a class="btn btn-outline" href="data/nepal_earthquakes.geojson" download data-i18n="dl.geo"></a>
            </div>
            <p class="muted" style="font-size:.8rem;margin:12px 0 0" data-i18n="dl.note"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/insights.js"></script>
  <script src="assets/js/pages/insights-plus.js"></script>
</body>
</html>
