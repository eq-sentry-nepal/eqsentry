      "en": {
        "meta.title": "1934 & 2015: Nepal's Great Earthquakes — EQ Sentry", "meta.desc": "Deep dives into the 1934 Nepal–Bihar (M8.0) and 2015 Gorkha (M7.8) earthquakes: what happened hour by hour, why, and the lessons that still matter.",
        "hi.eyebrow": "History",
        "hi.h1": "The two quakes that define Nepal's risk",
        "hi.sub": "Everything Nepal knows about earthquake safety was paid for in 1934 and 2015. Here is what happened, why it happened, and what those days still teach.",

        "hi.34.tag": "15 January 1934 · 2:13 PM",
        "hi.34.t": "The Nepal–Bihar earthquake · M8.0 · 1990 BS",
        "hi.34.p1": "On a mild winter Monday afternoon, a roughly 300-km stretch of the Himalayan fault east of Kathmandu ruptured. The shaking lasted several minutes. In the Kathmandu Valley, entire bazaars of brick and timber collapsed; in the eastern Terai and Bihar, the ground itself failed — liquefaction tilted buildings whole and opened fissures across the plains.",
        "hi.34.p2": "More than 10,000 people died in Nepal and India together — over 8,500 of them in Nepal by most estimates. Kathmandu, Bhaktapur and Patan lost temples, towers and thousands of homes; the original Dharahara fell, as it would again 81 years later.",
        "hi.34.p3": "1934 remains the benchmark 'great earthquake' for the region: instrumental magnitude about 8.0, felt from Lhasa to Mumbai. Scientists estimate such eastern-Nepal ruptures recur on the order of centuries — the strain has been rebuilding ever since.",
        "hi.34.s1": "magnitude", "hi.34.s2": "deaths (Nepal + India)", "hi.34.s3": "minutes of shaking", "hi.34.s4": "km of fault ruptured",
        "hi.34.v1": "M8.0", "hi.34.v2": "10,000+", "hi.34.v3": "~3", "hi.34.v4": "~300",

        "hi.15.tag": "25 April 2015 · 11:56 AM",
        "hi.15.t": "The Gorkha earthquake · M7.8 · 2072 BS",
        "hi.15.p1": "On a Saturday just before noon — schools closed, many people outdoors — the fault under central Nepal ruptured from Gorkha eastward, passing directly beneath the Kathmandu Valley. Nearly 9,000 people died and over 600,000 homes were destroyed, most of them unreinforced masonry in the hill districts.",
        "hi.15.p2": "The rupture unzipped eastward for about 140 km. Seventeen days later, on 12 May, its largest aftershock — M7.3 near Dolakha — brought down buildings the first quake had weakened. Aftershocks strong enough to feel continued for months; the sequence is still visible in this site's catalogue.",
        "hi.15.p3": "Landslides buried villages and blocked rivers; Langtang village was destroyed by a massive avalanche of ice and rock. Yet the timing — midday, weekend — and decades of retrofitting schools prevented a far worse toll. Engineers estimate a nighttime rupture could have doubled it.",
        "hi.15.s1": "magnitude", "hi.15.s2": "lives lost", "hi.15.s3": "homes destroyed", "hi.15.s4": "M7.3 aftershock · 17 days later",
        "hi.15.v1": "M7.8", "hi.15.v2": "~9,000", "hi.15.v3": "600k+", "hi.15.v4": "M7.3",

        "hi.tl.t": "How the day unfolded (2015)",
        "hi.tl.1": "<b>11:56</b> — M7.8 rupture begins ~77 km NW of Kathmandu, 8.2 km deep, and races east under the valley.",
        "hi.tl.2": "<b>11:57–12:30</b> — collapses across Kathmandu, Bhaktapur, Sindhupalchok, Gorkha; Dharahara falls; avalanches on Everest and in Langtang.",
        "hi.tl.3": "<b>First 48 hours</b> — 100+ aftershocks M4+; survivors sleep in open squares; rescue teams dig by hand.",
        "hi.tl.4": "<b>12 May</b> — M7.3 aftershock near Dolakha kills over 200 and flattens weakened buildings.",
        "hi.tl.5": "<b>Months after</b> — 3.5 million people homeless into the monsoon; reconstruction and retrofitting reshape Nepal's building code enforcement.",

        "hi.les.t": "What those days still teach",
        "hi.les.1.t": "Buildings kill, not shaking",
        "hi.les.1.d": "In both disasters, almost every death traced back to unreinforced masonry. A retrofitted room is worth more than any app — check your building.",
        "hi.les.2.t": "The first quake isn't the end",
        "hi.les.2.d": "2015's deadliest surprise came 17 days later. After any big quake, treat weakened buildings as dangerous and expect strong aftershocks for weeks.",
        "hi.les.3.t": "Timing is luck — readiness isn't",
        "hi.les.3.d": "2015 struck at Saturday midday and spared thousands of schoolchildren. You can't schedule the next one; you can practise the drill and pack the bag.",
        "hi.les.4.t": "The strain is still building",
        "hi.les.4.d": "The 2015 rupture stopped short of western Nepal, where no great quake has struck since 1505. That stored energy is why preparedness matters most in the west.",

        "hi.cta.t": "Turn history into readiness",
        "hi.cta.p": "Ten minutes today: run the family drill, check your building, pack the bag.",
        "hi.cta.b1": "Preparedness guide", "hi.cta.b2": "See both on the map",
        "hi.src": "Figures are widely reported estimates (USGS, NSET, Government of Nepal PDNA); sources vary — see About for data notes."
      },
      "ne": {
        "meta.title": "१९३४ र २०१५: नेपालका महाभूकम्प — EQ Sentry", "meta.desc": "वि.सं. १९९० र २०७२ का महाभूकम्पको पूरा कथा — के भयो, किन भयो, र हामीले के सिक्यौँ।",
        "hi.eyebrow": "इतिहास",
        "hi.h1": "नेपालको जोखिम परिभाषित गर्ने दुई भूकम्प",
        "hi.sub": "भूकम्प सुरक्षाबारे नेपालले जानेका हरेक पाठको मूल्य १९३४ र २०१५ मा तिरिएको हो। के भयो, किन भयो, र ती दिनहरूले अझै के सिकाउँछन् — यहाँ छ।",

        "hi.34.tag": "१५ जनवरी १९३४ (माघ २, १९९०) · दिउँसो २:१३",
        "hi.34.t": "नेपाल–बिहार भूकम्प · M८.० · वि.सं. १९९०",
        "hi.34.p1": "जाडोको एक सोमबार दिउँसो, काठमाडौंपूर्व हिमालयन भ्रंशको करिब ३०० कि.मी. भाग फाट्यो। हल्लाइ केही मिनेटसम्म चल्यो। काठमाडौं उपत्यकामा इँटा र काठका पूरै बजार ढले; पूर्वी तराई र बिहारमा त जमिनै धस्सियो — तरलीकरणले भवन डुबायो र मैदानभरि धाँजा फाट्यो।",
        "hi.34.p2": "नेपाल र भारत गरी १०,००० भन्दा बढीको मृत्यु भयो — धेरै अनुमानअनुसार नेपालमै ८,५०० माथि। काठमाडौं, भक्तपुर र पाटनले मन्दिर, गजुर र हजारौं घर गुमाए; पहिलो धरहरा ढल्यो — ८१ वर्षपछि फेरि ढल्ने गरी।",
        "hi.34.p3": "१९३४ यस क्षेत्रको 'महाभूकम्प'को मानक नै हो: यान्त्रिक म्याग्निच्युड करिब ८.०, ल्हासादेखि मुम्बईसम्म महसुस। वैज्ञानिकहरूका अनुसार पूर्वी नेपालका यस्ता भूकम्प शताब्दीऔंको अन्तरमा दोहोरिन्छन् — तनाव त्यसयता फेरि थुप्रिँदै छ।",
        "hi.34.s1": "म्याग्निच्युड", "hi.34.s2": "मृत्यु (नेपाल + भारत)", "hi.34.s3": "मिनेट हल्लाइ", "hi.34.s4": "कि.मी. भ्रंश फाट्यो",
        "hi.34.v1": "M८.०", "hi.34.v2": "१०,०००+", "hi.34.v3": "~३", "hi.34.v4": "~३००",

        "hi.15.tag": "२५ अप्रिल २०१५ (वैशाख १२, २०७२) · दिउँसो ११:५६",
        "hi.15.t": "गोरखा भूकम्प · M७.८ · वि.सं. २०७२",
        "hi.15.p1": "शनिबार मध्याह्न हुनै लाग्दा — विद्यालय बन्द, धेरै मानिस बाहिर — मध्य नेपालमुनिको भ्रंश गोरखाबाट पूर्वतिर फाट्यो, ठ्याक्कै काठमाडौं उपत्यकामुनि हुँदै। करिब ९,००० को ज्यान गयो र ६ लाखभन्दा बढी घर ध्वस्त भए — धेरैजसो पहाडी जिल्लाका बिनाप्रबलित गारोका।",
        "hi.15.p2": "भ्रंश करिब १४० कि.मी. पूर्वसम्म खुल्दै गयो। सत्र दिनपछि, १२ मे मा, यसको सबैभन्दा ठूलो पराकम्प — दोलखा नजिक M७.३ — ले पहिलो भूकम्पले कमजोर पारेका भवन ढाल्यो। महसुस हुने पराकम्प महिनौंसम्म आइरहे; त्यो शृंखला यस साइटको सूचीमा अझै देखिन्छ।",
        "hi.15.p3": "पहिरोले गाउँ पुरे, नदी थुने; लाङटाङ गाउँ हिउँ-ढुंगाको विशाल हिमपहिरोले नष्ट भयो। तैपनि समय — दिउँसो, बिदाको दिन — र विद्यालय सुदृढीकरणका दशकौंका प्रयासले अझ ठूलो क्षति रोके। इन्जिनियरहरूको अनुमानमा रातको भूकम्पले क्षति दोब्बर पार्न सक्थ्यो।",
        "hi.15.s1": "म्याग्निच्युड", "hi.15.s2": "ज्यान गुमाए", "hi.15.s3": "घर ध्वस्त", "hi.15.s4": "M७.३ पराकम्प · १७ दिनपछि",
        "hi.15.v1": "M७.८", "hi.15.v2": "~९,०००", "hi.15.v3": "६ लाख+", "hi.15.v4": "M७.३",

        "hi.tl.t": "त्यो दिन कसरी बित्यो (२०१५)",
        "hi.tl.1": "<b>११:५६</b> — काठमाडौंबाट ~७७ कि.मी. उत्तर-पश्चिम, ८.२ कि.मी. गहिराइमा M७.८ सुरु; भ्रंश उपत्यकामुनि हुँदै पूर्वतिर दौडियो।",
        "hi.tl.2": "<b>११:५७–१२:३०</b> — काठमाडौं, भक्तपुर, सिन्धुपाल्चोक, गोरखामा भवन ढले; धरहरा ढल्यो; सगरमाथा र लाङटाङमा हिमपहिरो।",
        "hi.tl.3": "<b>पहिलो ४८ घण्टा</b> — M४+ का १००+ पराकम्प; मानिस खुला चोकमा सुते; उद्धारकर्मीले हातैले खने।",
        "hi.tl.4": "<b>१२ मे</b> — दोलखा नजिक M७.३ पराकम्पले २०० बढीको ज्यान लियो, कमजोर भवन ढाल्यो।",
        "hi.tl.5": "<b>महिनौंपछि</b> — ३५ लाख मानिस वर्षायाममा घरविहीन; पुनर्निर्माण र रेट्रोफिटले भवन संहिता कार्यान्वयन बदल्यो।",

        "hi.les.t": "ती दिनहरूले अझै सिकाउने पाठ",
        "hi.les.1.t": "मार्ने भवनले हो, हल्लाइले होइन",
        "hi.les.1.d": "दुवै विपद्मा झन्डै हरेक मृत्यु बिनाप्रबलित गारोसँग जोडिन्छ। सुदृढ कोठा कुनै पनि एपभन्दा मूल्यवान् छ — आफ्नो भवन जाँच्नुहोस्।",
        "hi.les.2.t": "पहिलो भूकम्प अन्त्य होइन",
        "hi.les.2.d": "२०१५ को सबैभन्दा घातक झट्का १७ दिनपछि आयो। ठूलो भूकम्पपछि कमजोर भवनलाई खतरनाक मान्नुहोस् र हप्तौंसम्म बलिया पराकम्पको अपेक्षा गर्नुहोस्।",
        "hi.les.3.t": "समय भाग्य हो — तयारी होइन",
        "hi.les.3.d": "२०१५ शनिबार दिउँसो गयो र हजारौं विद्यार्थी जोगिए। अर्को कहिले आउँछ रोज्न सकिँदैन; ड्रिल अभ्यास र झोला तयारी भने सकिन्छ।",
        "hi.les.4.t": "तनाव अझै थुप्रिँदै छ",
        "hi.les.4.d": "२०१५ को फाटाइ पश्चिम नेपालसम्म पुगेन — त्यहाँ १५०५ यता महाभूकम्प गएको छैन। त्यही सञ्चित ऊर्जाका कारण पश्चिममा तयारी सबैभन्दा जरुरी छ।",

        "hi.cta.t": "इतिहासलाई तयारीमा बदल्नुहोस्",
        "hi.cta.p": "आजको दश मिनेट: पारिवारिक ड्रिल गर्नुहोस्, भवन जाँच्नुहोस्, झोला मिलाउनुहोस्।",
        "hi.cta.b1": "पूर्वतयारी निर्देशिका", "hi.cta.b2": "नक्सामा दुवै हेर्नुहोस्",
        "hi.src": "तथ्याङ्क व्यापक रूपमा उल्लिखित अनुमान हुन् (USGS, NSET, नेपाल सरकार PDNA); स्रोतअनुसार फरक पर्न सक्छन् — डेटा टिप्पणीका लागि हाम्रोबारे हेर्नुहोस्।"
      }
