            <div class="field"><label data-i18n="com.f.sev"></label>
              <select id="r-sev">
                <option value="minor" data-i18n="com.sev.minor"></option>
                <option value="moderate" data-i18n="com.sev.moderate"></option>
                <option value="severe" data-i18n="com.sev.severe"></option>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" data-i18n="com.submit"></button>

          <h3 data-i18n="com.support.t"></h3>

            <a class="btn btn-outline" href="https://nrcs.org/" target="_blank" rel="noopener" data-i18n="com.volunteer"></a>
