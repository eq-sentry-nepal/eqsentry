  <style>
    .felt-scale { display:grid; gap:8px; margin:4px 0 6px; }
    .felt-opt { display:flex; align-items:center; gap:12px; padding:11px 14px; border:1px solid var(--line); border-radius:11px; background:var(--surface); cursor:pointer; transition:border-color .15s, background .15s; }
    .felt-opt:hover { border-color:var(--line-2); }
    .felt-opt.sel { border-color:var(--accent); background:var(--surface-2); }
    .felt-opt input { position:absolute; opacity:0; pointer-events:none; }
    .felt-sw { flex:0 0 auto; width:18px; height:18px; border-radius:5px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.25); }
    .felt-opt .lv { font-family:var(--mono,monospace); font-weight:700; flex:0 0 24px; color:var(--ink-soft); font-size:.9rem; }
    .felt-opt .tx { font-size:.95rem; }
    .felt-legend { display:flex; flex-wrap:wrap; gap:6px 14px; margin:0 0 14px; font-size:.8rem; color:var(--ink-soft); }
    .felt-legend span { display:inline-flex; align-items:center; gap:6px; }
    .felt-legend i { width:13px; height:13px; border-radius:4px; display:inline-block; box-shadow:inset 0 0 0 1px rgba(0,0,0,.25); }
    #feltMap { height:460px; border-radius:16px; border:1px solid var(--line); overflow:hidden; background:var(--surface); }
    .felt-recent { margin-top:18px; display:grid; gap:8px; }
    .felt-rec { display:flex; gap:12px; align-items:flex-start; padding:11px 14px; border:1px solid var(--line); border-radius:11px; background:var(--surface); }
    .felt-rec .dot { flex:0 0 auto; width:12px; height:12px; border-radius:50%; margin-top:5px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.25); }
    .felt-rec .rmeta { font-size:.78rem; color:var(--ink-faint); }
    .felt-rec .rmsg { font-size:.9rem; margin:2px 0 0; }
    .btn-geo { font-size:.85rem; }
    .btn-geo.on { border-color:var(--ok,#34D399); color:var(--ok,#34D399); }
    @media (max-width:860px){ #feltMap { height:380px; } }

<body data-page="felt">
  <header class="site-header" id="site-header"></header>
  <div id="alertBar"></div>

  <section class="page-hero section tight">
    <div class="container">
      <span class="eyebrow" data-i18n="dyfi.eyebrow"></span>
      <h1 data-i18n="dyfi.h1"></h1>
      <p class="lead" data-i18n="dyfi.sub"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="callout danger" style="margin-bottom:24px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>
        <p data-i18n="dyfi.intro"></p>
      </div>

      <div class="grid cols-2" style="gap:36px;align-items:start">
        <!-- Report form -->
        <div class="form-card">
          <h2 style="margin-top:0" data-i18n="dyfi.form.t"></h2>
          <form id="feltForm" autocomplete="off">
            <div class="field">
              <label for="feltDistrict" data-i18n="dyfi.where"></label>
              <select id="feltDistrict"></select>
              <button type="button" id="feltGeo" class="btn btn-ghost btn-geo" style="margin-top:10px" data-i18n="dyfi.geo"></button>
            </div>

            <div class="field">
              <label data-i18n="dyfi.how"></label>
              <div class="felt-scale" id="feltScale" role="radiogroup"></div>
            </div>

            <div class="field">
              <label for="feltName" data-i18n="dyfi.name"></label>
              <input id="feltName" maxlength="80" data-i18n-placeholder="dyfi.name.ph" />
            </div>
            <div class="field">
              <label for="feltMsg" data-i18n="dyfi.notes"></label>
              <textarea id="feltMsg" rows="3" maxlength="1000" data-i18n-placeholder="dyfi.notes.ph"></textarea>
            </div>

            <button type="submit" id="feltSubmit" class="btn btn-primary" data-i18n="dyfi.submit"></button>
            <p id="feltStatus" class="muted" style="font-size:.88rem;margin:12px 0 0" role="status" aria-live="polite"></p>
          </form>
        </div>

        <!-- Map + recent -->
        <div>
          <h2 style="margin-top:0" data-i18n="dyfi.map.t"></h2>
          <p class="muted" data-i18n="dyfi.map.sub"></p>
          <div class="felt-legend"><strong data-i18n="dyfi.legend.t" style="color:var(--ink-soft);font-weight:600"></strong><span id="feltLegend"></span></div>
          <div id="feltMap"></div>
          <h3 style="margin:22px 0 0" data-i18n="dyfi.recent.t"></h3>
          <div class="felt-recent" id="feltRecent"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>
