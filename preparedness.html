        "prep.sub": "Most earthquake injuries are preventable. These steps — for before, during and after a quake — are based on guidance from international and Nepali disaster authorities.",

        "prep.before.t": "Prepare your home and family",
        "prep.before.list": "<li><b>Secure heavy items.</b> Anchor cupboards, bookshelves, water heaters and tall furniture to the wall. Keep beds away from windows.</li><li><b>Identify safe spots</b> in each room — under sturdy tables, against interior walls — and danger spots near glass and heavy objects.</li><li><b>Build a go-bag</b> (see checklist below) and keep it where everyone can reach it.</li><li><b>Agree a family plan:</b> a meeting point, an out-of-area contact, and who collects the children.</li><li><b>Learn the shut-offs</b> for gas, electricity and water in your home.</li><li><b>Check your building.</b> Ask an engineer about retrofitting older or unreinforced masonry homes.</li>",

        "prep.during.t": "The moment it strikes",
        "prep.during.list": "<li><b>Indoors — Drop, Cover, Hold On.</b> Get under a sturdy table, protect your head and neck, and stay until shaking stops. Do not run outside mid-shake.</li><li><b>Stay away</b> from windows, glass, brick walls and anything that can fall.</li><li><b>Outdoors —</b> move to an open area away from buildings, walls, trees and power lines, then crouch low.</li><li><b>In a vehicle —</b> pull over in a clear spot away from bridges and buildings, and stay inside with your seatbelt on.</li><li><b>If in bed —</b> stay, turn face-down and cover your head with a pillow.</li><li><b>Do not use lifts (elevators).</b></li>",

        "prep.after.list": "<li><b>Expect aftershocks.</b> Drop, Cover and Hold On again each time.</li><li><b>Check yourself and others</b> for injuries; give first aid. Do not move the seriously injured unless they are in danger.</li><li><b>Check for hazards</b> — gas leaks (smell), fires, damaged wiring. If you smell gas, shut it off and leave; don't light matches or switches.</li><li><b>Evacuate damaged buildings</b> and stay out. Use stairs, never lifts.</li><li><b>Listen</b> to radio/official channels for instructions. Avoid spreading rumours.</li><li><b>Keep phone lines free</b> for emergencies; send a short text rather than calling.</li>",

        "prep.before.list": "<li><b>गह्रौं सामान बाँध्नुहोस्।</b> दराज, किताबको र्‍याक, पानी ट्याङ्की र अग्ला फर्निचर भित्तामा कस्नुहोस्। ओछ्यान झ्यालबाट टाढा राख्नुहोस्।</li><li><b>सुरक्षित ठाउँ पहिचान गर्नुहोस्</b> — बलियो टेबलमुनि, भित्री भित्ताको छेउ — र सिसा वा गह्रौं वस्तु नजिकका जोखिमपूर्ण ठाउँ चिन्नुहोस्।</li><li><b>आपत्कालीन झोला</b> (तलको सूची हेर्नुहोस्) तयार गरी सबैले भ्याउने ठाउँमा राख्नुहोस्।</li><li><b>पारिवारिक योजना बनाउनुहोस्:</b> भेट्ने ठाउँ, क्षेत्रबाहिरको सम्पर्क व्यक्ति, र बच्चालाई कसले लिने।</li><li>घरको <b>ग्यास, बिजुली र पानीको मुख्य स्विच/भल्भ बन्द गर्न सिक्नुहोस्।</b></li><li><b>घरको जाँच गराउनुहोस्।</b> पुराना वा कमजोर इँटाका घरका लागि इन्जिनियरसँग सुदृढीकरण (रेट्रोफिट) बारे सल्लाह लिनुहोस्।</li>",

        "prep.during.tag": "बेला",
        "prep.during.t": "भूकम्प आउँदाको क्षण",
        "prep.during.list": "<li><b>घरभित्र — घोप्टिनुहोस्, ओत लिनुहोस्, समाउनुहोस्।</b> बलियो टेबलमुनि गई टाउको र घाँटी जोगाउनुहोस्, हल्लाइ नरोकिएसम्म त्यहीँ रहनुहोस्। हल्लिँदै गर्दा बाहिर नदौडनुहोस्।</li><li>झ्याल, सिसा, इँटाका भित्ता र खस्न सक्ने कुनै पनि वस्तुबाट <b>टाढा रहनुहोस्।</b></li><li><b>घरबाहिर —</b> भवन, पर्खाल, रूख र बिजुलीका तारबाट टाढा खुला ठाउँमा गई निहुरिनुहोस्।</li><li><b>सवारीमा —</b> पुल र भवनबाट टाढा खुला ठाउँमा रोकी सिटबेल्ट लगाएर भित्रै बस्नुहोस्।</li><li><b>ओछ्यानमा भए —</b> त्यहीँ रही घोप्टो परी सिरानीले टाउको छोप्नुहोस्।</li><li><b>लिफ्ट प्रयोग नगर्नुहोस्।</b></li>",

    <div class="container">

  <!-- Personalized plan generator -->
  <section class="section">
    <div class="container">
      <div class="sec-head center reveal">
        <span class="eyebrow" data-i18n="pg.eyebrow"></span>
        <h2 data-i18n="pg.title"></h2>
        <p class="lead" data-i18n="pg.sub"></p>
      </div>
      <div class="grid cols-2" style="gap:30px;align-items:start">
        <div class="form-card reveal">
          <div class="field"><label data-i18n="pg.size"></label><input id="pgSize" type="number" min="1" max="20" value="4" /></div>
          <div class="field"><label data-i18n="pg.home"></label>
            <select id="pgHome">
              <option value="rcc" data-i18n="pg.home.rcc"></option>
              <option value="brick" data-i18n="pg.home.brick"></option>
              <option value="mud" data-i18n="pg.home.mud"></option>
              <option value="high" data-i18n="pg.home.high"></option>
            </select>
          </div>
          <div class="field"><label data-i18n="pg.members"></label>
            <div class="flex wrap" style="gap:10px 18px">
              <label style="font-weight:500;color:var(--ink-soft);display:flex;gap:7px;align-items:center"><input type="checkbox" id="pgChildren" style="width:auto" /> <span data-i18n="pg.m.children"></span></label>
              <label style="font-weight:500;color:var(--ink-soft);display:flex;gap:7px;align-items:center"><input type="checkbox" id="pgElderly" style="width:auto" /> <span data-i18n="pg.m.elderly"></span></label>
              <label style="font-weight:500;color:var(--ink-soft);display:flex;gap:7px;align-items:center"><input type="checkbox" id="pgDisability" style="width:auto" /> <span data-i18n="pg.m.disability"></span></label>
              <label style="font-weight:500;color:var(--ink-soft);display:flex;gap:7px;align-items:center"><input type="checkbox" id="pgPets" style="width:auto" /> <span data-i18n="pg.m.pets"></span></label>
            </div>
          </div>
          <div class="field"><label data-i18n="pg.district"></label><input id="pgDistrict" type="text" /></div>
          <button class="btn btn-primary" id="pgGen" style="width:100%;justify-content:center" data-i18n="pg.generate"></button>
        </div>
        <div id="pgResult" style="display:none"></div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
