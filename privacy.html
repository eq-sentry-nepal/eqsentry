        "pv.eyebrow": "Privacy", "pv.h1": "Privacy Policy", "pv.updated": "Last updated: June 2026",

        "pv.collect.t": "What we collect",
        "pv.collect.p": "When you register for alerts we collect the details you enter: your name, mobile number and/or email, your district, your preferred language, and the magnitude threshold you choose. If you don't register, we don't collect personal details — the map and guidance work without an account.",

        "pv.share.p": "To deliver messages we pass your contact detail and the alert text to our delivery providers — an SMS gateway (e.g. Sparrow SMS in Nepal) and/or an email provider. They process it only to deliver the message. We never sell your information or share it for marketing.",
