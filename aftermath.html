    {
      "en": {
        "meta.title": "After the Earthquake — EQ Sentry Nepal", "meta.desc": "What to do in the first 72 hours after an earthquake in Nepal: aftershocks, first aid, re-entering buildings, water and sanitation, and emotional support.",
        "af.eyebrow": "After a quake",
        "af.h1": "After the shaking stops",
        "af.sub": "The first 72 hours decide a lot. Aftershocks, damaged buildings, injuries and unsafe water are the real dangers now. Here's what to do — and in what order.",
        "af.warn": "Expect aftershocks. Each time the ground moves again: Drop, Cover, Hold On. Aftershocks can be large and can collapse already-weakened buildings.",

        "af.first.t": "The first minutes",
        "af.first.tag": "Act now",
        "af.first.list": "<li><b>Check yourself, then others</b> for injuries before you do anything else.</li><li><b>Put on sturdy shoes</b> — there will be broken glass and rubble.</li><li><b>Get out of a damaged building</b> calmly, using stairs — never a lift.</li><li><b>Smell for gas.</b> If you smell it, shut off the supply, open windows and leave; don't light a match or flip a switch.</li><li><b>Stay away</b> from damaged walls, hanging wires and anything that can still fall.</li><li><b>Move to open ground</b> away from buildings, walls, poles and power lines.</li>",

        "af.aid.t": "Basic first aid",
        "af.aid.list": "<li><b>Severe bleeding:</b> press firmly on the wound with a clean cloth and keep pressing.</li><li><b>Don't move</b> someone with a possible spine or serious injury unless they're in immediate danger.</li><li><b>Fractures:</b> support and immobilise the limb; don't try to straighten it.</li><li><b>Keep the injured warm</b> and reassured to prevent shock.</li><li><b>Crush injuries</b> (trapped limbs) need hospital care — flag for rescuers.</li>",
        "af.aid.note": "This is basic guidance, not a substitute for medical care. For serious injuries call an ambulance: 102 or Red Cross 1130.",

        "af.reentry.t": "Is it safe to go back inside?",
        "af.reentry.list": "<li>Leaning or bulging walls</li><li>Large or X-shaped cracks, especially in columns</li><li>Sagging floors, beams or roof</li><li>Broken or crushed pillars / exposed bent steel</li><li>A smell of gas, or sparking wires</li>",
        "af.reentry.note": "If you see any of these — or you're unsure — stay out. Aftershocks can bring a damaged building down. Wait for an official safety assessment before re-entering.",

        "af.water.t": "Water & sanitation",
        "af.water.list": "<li><b>Assume tap water may be unsafe</b> after a quake.</li><li><b>Make it safe:</b> boil for 1 minute, or use chlorine/purification tablets, or clear bottles in direct sun for 6 hours (SODIS).</li><li><b>Store water</b> in clean, covered containers.</li><li><b>Keep toilets/latrines away</b> from water sources; wash hands with soap.</li><li>Clean water and hygiene prevent the disease outbreaks that often follow disasters.</li>",

        "af.shock.t": "Aftershocks",
        "af.shock.p": "Aftershocks follow every large earthquake and can continue for days or weeks — some nearly as strong as the first. Stay out of damaged buildings, keep shoes, a torch and your go-bag beside you, and Drop, Cover, Hold On every time you feel shaking.",

        "af.mind.t": "Look after each other",
        "af.mind.list": "<li>Strong fear, shaking, trouble sleeping and tears are <b>normal reactions</b> to a frightening event.</li><li>Stay together, reconnect with family, and check on neighbours — especially the elderly and those living alone.</li><li>Listen without judging. Simple presence and calm help more than advice.</li><li>Rest, water, food and routine help people recover.</li>",
        "af.children.t": "Helping children cope",
        "af.children.list": "<li>Reassure them they are safe and stay close.</li><li>Keep simple routines — meals, sleep, play.</li><li>Answer questions honestly in simple words; let them talk or draw about it.</li><li>Limit their exposure to frightening images and rumours.</li>",

        "af2.as.t": "Aftershocks: what to expect",
        "af2.as.p": "Aftershocks are normal physics, not a sign of worse to come. They are most frequent in the first hours and days, then fade — but the largest one often arrives within the first two weeks, and any of them can topple a building the mainshock already weakened. Every time the ground moves: Drop, Cover, Hold On. After the 2015 M7.8, the strongest aftershock (M7.3) came 17 days later.",
        "af2.as.b": "See how real sequences decay →",
        "af2.tag.t": "If buildings get inspection tags",
        "af2.tag.list": "<li><b style='color:#34D399'>GREEN</b> — inspected, safe to enter and live in.</li><li><b style='color:#FBBF24'>YELLOW</b> — restricted: short, essential entries only (grab documents, medicines) and never during aftershocks.</li><li><b style='color:#EF4444'>RED</b> — unsafe. Do not enter for any reason.</li><li><b>No tag yet but visible cracks?</b> Treat it as yellow at best — sleep in the open or a shelter for the first nights.</li><li>Never remove or move a tag; report tampering to authorities.</li>",
        "af2.doc.t": "Document damage & register for relief",
        "af2.doc.list": "<li><b>Photograph everything first</b> — every room, cracks, the exterior — before moving or cleaning anything.</li><li><b>Keep receipts</b> for emergency spending (tarpaulin, medicines, transport); relief and insurance may reimburse.</li><li><b>Register the damage</b> at your ward office as soon as lists open — that record is the door to compensation and rebuilding grants.</li><li><b>Keep citizenship and land-paper copies</b> in the go-bag; they are what officials will ask for.</li><li><b>Beware of scams:</b> no genuine relief programme charges a 'registration fee'.</li>",
        "af.help.t": "Getting help & staying informed",
        "af.help.p": "Call emergency services for life-threatening situations. Listen to radio and official channels for instructions and aid points. Beware rumours — they spread fast after a quake and cause panic.",
        "af.help.res": "Emergency numbers & services",
        "af.help.facts": "Facts vs rumors",

        "af.cta.t": "Prepare now, recover faster",
        "af.cta.p": "The households that recover best are the ones that prepared. Build your kit and family plan today.",
        "af.cta.b": "Preparedness guide"
      },
      "ne": {
        "meta.title": "भूकम्पपछि — EQ Sentry नेपाल", "meta.desc": "हल्लाइ रोकिएपछिका पहिलो मिनेट, घण्टा र दिनमा के गर्ने — सुरक्षा जाँच, राहत र पुनर्लाभ।",
        "af.eyebrow": "भूकम्पपछि",
        "af.h1": "हल्लाइ रोकिएपछि",
        "af.sub": "पहिलो ७२ घण्टाले धेरै कुरा निर्धारण गर्छ। पराकम्प, क्षतिग्रस्त भवन, चोटपटक र असुरक्षित पानी अहिलेका वास्तविक खतरा हुन्। के गर्ने — र कुन क्रममा, यहाँ छ।",
        "af.warn": "पराकम्प आउँछ भन्ने अपेक्षा गर्नुहोस्। जमिन फेरि हल्लिँदा हरेकपटक: घोप्टिनुहोस्, ओत लिनुहोस्, समाउनुहोस्। पराकम्प ठूलो हुनसक्छ र कमजोर भइसकेका भवन ढाल्न सक्छ।",

        "af.first.t": "पहिलो मिनेटहरू",
        "af.first.tag": "तुरुन्तै",
        "af.first.list": "<li>अरू केही गर्नुअघि <b>आफू र अरूलाई</b> चोट लागे/नलागेको जाँच्नुहोस्।</li><li><b>बलियो जुत्ता लगाउनुहोस्</b> — सिसा र भग्नावशेष हुनेछन्।</li><li>क्षतिग्रस्त भवनबाट <b>शान्तसँग, भर्‍याङबाट निस्कनुहोस्</b> — लिफ्ट कहिल्यै होइन।</li><li><b>ग्यासको गन्ध</b> जाँच्नुहोस्। गन्ध आए भल्भ बन्द गरी झ्याल खोली बाहिर निस्कनुहोस्; सलाई वा स्विच नबाल्नुहोस्।</li><li>क्षतिग्रस्त भित्ता, झुन्डिएका तार र खस्न सक्ने वस्तुबाट <b>टाढा रहनुहोस्।</b></li><li>भवन, पर्खाल, खम्बा र बिजुलीका तारबाट टाढा <b>खुला ठाउँमा जानुहोस्।</b></li>",

        "af.aid.t": "प्राथमिक उपचार",
        "af.aid.list": "<li><b>धेरै रगत बगे:</b> सफा कपडाले घाउमा बलियोसँग थिच्नुहोस् र थिचिरहनुहोस्।</li><li>मेरुदण्ड वा गम्भीर चोटको आशंका भएको व्यक्तिलाई तत्काल खतरा नभए <b>नहल्लाउनुहोस्।</b></li><li><b>हाडभाँचो:</b> अंगलाई अड्याएर स्थिर राख्नुहोस्; सोझ्याउने प्रयास नगर्नुहोस्।</li><li>सक (शक) रोक्न घाइतेलाई <b>न्यानो र आश्वस्त</b> राख्नुहोस्।</li><li><b>थिचिएको चोट</b> (किचिएका अंग) लाई अस्पताल चाहिन्छ — उद्धारकर्तालाई संकेत गर्नुहोस्।</li>",
        "af.aid.note": "यो आधारभूत निर्देशन हो, चिकित्सा उपचारको विकल्प होइन। गम्भीर चोटका लागि एम्बुलेन्स बोलाउनुहोस्: १०२ वा रेडक्रस ११३०।",

        "af.reentry.t": "के भित्र फर्किन सुरक्षित छ?",
        "af.reentry.list": "<li>ढल्केका वा फुलेका भित्ता</li><li>ठूला वा X-आकारका चर्के, विशेषगरी खम्बामा</li><li>झुकेका भुइँ, बिम वा छत</li><li>भाँचिएका वा किचिएका खम्बा / बाहिर निस्केका बाङ्गिएका छड</li><li>ग्यासको गन्ध, वा चट्किने तार</li>",
        "af.reentry.note": "यीमध्ये कुनै देखे — वा अनिश्चित भए — बाहिरै रहनुहोस्। पराकम्पले क्षतिग्रस्त भवन ढाल्न सक्छ। फर्किनुअघि आधिकारिक सुरक्षा मूल्याङ्कन पर्खनुहोस्।",

        "af.water.t": "पानी र सरसफाइ",
        "af.water.list": "<li>भूकम्पपछि <b>धाराको पानी असुरक्षित हुनसक्छ</b> भन्ने मान्नुहोस्।</li><li><b>सुरक्षित बनाउनुहोस्:</b> १ मिनेट उमाल्नुहोस्, वा क्लोरिन/प्युरिफिकेसन ट्याब्लेट, वा सफा बोतलमा ६ घण्टा घाममा (SODIS)।</li><li>पानी <b>सफा, छोपिएका भाँडामा</b> भण्डार गर्नुहोस्।</li><li>शौचालय/चर्पी <b>पानीको स्रोतबाट टाढा</b> राख्नुहोस्; साबुनले हात धुनुहोस्।</li><li>सफा पानी र सरसफाइले विपद्पछि फैलिने रोग रोक्छ।</li>",

        "af.shock.t": "पराकम्प",
        "af.shock.p": "हरेक ठूलो भूकम्पपछि पराकम्प आउँछ र दिन वा हप्तौंसम्म जारी रहन सक्छ — कति त पहिलो जत्तिकै बलियो। क्षतिग्रस्त भवनबाट टाढै रहनुहोस्, जुत्ता, टर्च र झोला छेउमा राख्नुहोस्, र हल्लिँदा हरेकपटक घोप्टिनुहोस्-ओत लिनुहोस्-समाउनुहोस्।",

        "af.mind.t": "एकअर्काको ख्याल राख्नुहोस्",
        "af.mind.list": "<li>तीव्र डर, काम्ने, निद्रा नलाग्ने र आँसु डरलाग्दो घटनाप्रतिका <b>सामान्य प्रतिक्रिया</b> हुन्।</li><li>सँगै रहनुहोस्, परिवारसँग जोडिनुहोस्, छिमेकीको खबर लिनुहोस् — विशेषगरी वृद्ध र एक्लै बस्नेको।</li><li>नआलोचना गरी सुन्नुहोस्। सल्लाहभन्दा शान्त उपस्थितिले बढी सघाउँछ।</li><li>आराम, पानी, खाना र दिनचर्याले मानिसलाई सुधारमा सहयोग गर्छ।</li>",
        "af.children.t": "बालबालिकालाई सघाउने",
        "af.children.list": "<li>उनीहरू सुरक्षित छन् भनी आश्वस्त पारी नजिकै रहनुहोस्।</li><li>सरल दिनचर्या — खाना, निद्रा, खेल — कायम राख्नुहोस्।</li><li>सरल शब्दमा इमानदारीपूर्वक उत्तर दिनुहोस्; उनीहरूलाई बोल्न वा चित्र बनाउन दिनुहोस्।</li><li>डरलाग्दा तस्बिर र अफवाहबाट टाढा राख्नुहोस्।</li>",

        "af2.as.t": "पराकम्प: के अपेक्षा गर्ने",
        "af2.as.p": "पराकम्प सामान्य भौतिकी हो, झन् ठूलो आउने संकेत होइन। पहिला घण्टा र दिनहरूमा बाक्लो आउँछन्, अनि घट्दै जान्छन् — तर सबैभन्दा ठूलो पराकम्प प्रायः पहिलो दुई हप्ताभित्रै आउँछ, र जुनसुकैले मुख्य भूकम्पले कमजोर पारेको भवन ढाल्न सक्छ। जमिन हल्लिनेबित्तिकै: घोप्टिनुहोस्, ओत लिनुहोस्, समाउनुहोस्। २०१५ को M७.८ पछि सबैभन्दा बलियो पराकम्प (M७.३) १७ दिनपछि आएको थियो।",
        "af2.as.b": "वास्तविक शृंखला कसरी घट्छ हेर्नुहोस् →",
        "af2.tag.t": "भवनमा निरीक्षण ट्याग लागे",
        "af2.tag.list": "<li><b style='color:#34D399'>हरियो</b> — निरीक्षण भयो, पस्न र बस्न सुरक्षित।</li><li><b style='color:#FBBF24'>पहेँलो</b> — सीमित: छोटो, अत्यावश्यक काम मात्र (कागजात, औषधि लिन) — पराकम्पका बेला कहिल्यै होइन।</li><li><b style='color:#EF4444'>रातो</b> — असुरक्षित। कुनै पनि कारणले नपस्नुहोस्।</li><li><b>ट्याग छैन तर चिरा देखिन्छ?</b> बढीमा पहेँलोसरह मान्नुहोस् — पहिला रातहरू खुला ठाउँ वा आश्रयमा सुत्नुहोस्।</li><li>ट्याग कहिल्यै नहटाउनुहोस्; चलाइएको भेटे निकायलाई खबर गर्नुहोस्।</li>",
        "af2.doc.t": "क्षतिको अभिलेख र राहत दर्ता",
        "af2.doc.list": "<li><b>पहिले सबैको फोटो खिच्नुहोस्</b> — हरेक कोठा, चिरा, बाहिरी भाग — केही सार्नु/सफा गर्नुअघि नै।</li><li><b>रसिद राख्नुहोस्</b> — आपत्कालीन खर्चको (त्रिपाल, औषधि, यातायात); राहत वा बीमाले फिर्ता दिनसक्छ।</li><li><b>क्षति दर्ता गर्नुहोस्</b> — सूची खुल्नेबित्तिकै वडा कार्यालयमा; त्यही अभिलेख नै क्षतिपूर्ति र पुनर्निर्माण अनुदानको ढोका हो।</li><li><b>नागरिकता र जग्गाधनी कागजका प्रतिलिपि</b> झोलामै राख्नुहोस्; अधिकारीले तिनै माग्छन्।</li><li><b>ठगीबाट जोगिनुहोस्:</b> साँचो राहत कार्यक्रमले 'दर्ता शुल्क' लिँदैन।</li>",
        "af.help.t": "सहयोग र जानकारी",
        "af.help.p": "ज्यानमारा अवस्थामा आपत्कालीन सेवा बोलाउनुहोस्। निर्देशन र राहत स्थलका लागि रेडियो र आधिकारिक स्रोत सुन्नुहोस्। अफवाहबाट सतर्क रहनुहोस् — भूकम्पपछि छिटो फैलिन्छ र आतंक मच्चाउँछ।",
