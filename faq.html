        "faq.a4": "Drop, Cover and Hold On: drop to your hands and knees, take cover under sturdy furniture, protect your head and neck, and hold on until the shaking stops. <a href=\"preparedness.html\">Full guide</a>.",
        "faq.q5": "Should I run outside?",
        "faq.a5": "Usually no — most injuries happen from falling debris while running. Drop, Cover, Hold On indoors, unless you can reach genuine open ground in a step or two.",
        "faq.q6": "Are aftershocks dangerous?",
        "faq.a6": "Yes. Aftershocks can be large and can collapse buildings already weakened by the main quake. Stay out of damaged buildings and Drop-Cover-Hold each time the ground moves. <a href=\"aftermath.html\">After a quake</a>.",

        "faq.a7": "For the shaking itself, usually none — earthquakes strike without warning. EQ Sentry gives rapid awareness of what just happened and, once alerts are connected, can notify you about significant quakes near your district.",
        "faq.q8": "Is my house safe?",
        "faq.a8": "It depends on how it was built. Unreinforced brick/stone and soft (open) ground floors are the most vulnerable. <a href=\"building.html\">How to tell if your home is safe</a>.",
        "faq.q9": "What's the safest place in my home?",
        "faq.a9": "Under a sturdy table or against an interior wall, away from windows and heavy objects. Doorways are not safer in modern homes — Drop, Cover, Hold On is better.",

        "faq.a11": "Magnitude measures the energy released at the source — one number per quake. Intensity (Modified Mercalli) measures how strongly the shaking is felt at a particular place, and is higher near the epicentre. <a href=\"insights.html\">Explore both</a>.",

        "faq.eyebrow": "बारम्बार सोधिने प्रश्न",

        "faq.sub": "नेपालमा मानिसले भूकम्पबारे सबैभन्दा बढी सोध्ने प्रश्नका सीधा उत्तर।",
        "faq.q1": "के भूकम्पको पूर्वानुमान गर्न सकिन्छ?",
        "faq.a1": "सकिँदैन। कुनै व्यक्ति, एप वा जनावरले भविष्यको भूकम्पको दिन, समय, स्थान वा आकार भन्न सक्दैन। दाबी गर्नेसँग सतर्क रहनुहोस्। <a href=\"facts.html\">थप: तथ्य बनाम अफवाह</a>।",
        "faq.q2": "नेपालमा किन यति धेरै भूकम्प आउँछन्?",
        "faq.a2": "नेपाल त्यहाँ छ जहाँ भारतीय प्लेट युरेसियन प्लेटमुनि घुस्रिँदै वर्षको करिब २ से.मी.ले हिमाल उठाउँछ। यही टकरावले देशमुनिका भ्रंशमा ठूलो ऊर्जा सञ्चित गर्छ।",
        "faq.q3": "अर्को ठूलो भूकम्प कहिले आउँछ?",
        "faq.a3": "कसैलाई थाहा छैन — पूर्वानुमान गर्न सकिँदैन। वैज्ञानिकहरू भन्छन् तनाव बढ्दै छ, विशेषगरी पश्चिम नेपालमा; त्यसैले मितिको पर्खाइ नगरी अहिले नै तयारी गर्नु ठीक हो।",
        "faq.q4": "हल्लिँदा के गर्ने?",
        "faq.a4": "घोप्टिनुहोस्, ओत लिनुहोस्, समाउनुहोस्: हात-घुँडामा घोप्टिई बलियो फर्निचरमुनि ओत लिनुहोस्, टाउको-घाँटी जोगाउनुहोस्, हल्लाइ नरोकिएसम्म समातिराख्नुहोस्। <a href=\"preparedness.html\">पूर्ण निर्देशिका</a>।",
        "faq.q5": "के बाहिर दौडनु पर्छ?",
        "faq.a5": "प्रायः पर्दैन — धेरै चोट दौडँदा खस्ने भग्नावशेषबाट हुन्छ। एक-दुई पाइलामै खुला ठाउँ नभए घरभित्रै घोप्टिनुहोस्-ओत लिनुहोस्-समाउनुहोस्।",
        "faq.q6": "के पराकम्प खतरनाक हुन्छन्?",
        "faq.a6": "हुन्छन्। पराकम्प ठूला हुनसक्छन् र कमजोर भइसकेका भवन ढाल्न सक्छन्। क्षतिग्रस्त भवनबाट टाढै रहनुहोस् र हरेकपटक घोप्टिनुहोस्-ओत लिनुहोस्-समाउनुहोस्। <a href=\"aftermath.html\">भूकम्पपछि</a>।",
        "faq.q7": "मैले कति चेतावनी पाउँछु?",
        "faq.a7": "हल्लाइका लागि प्रायः केही पाइँदैन — भूकम्प चेतावनीबिनै आउँछ। EQ Sentry ले भर्खरै के भयो भन्ने छिटो जानकारी दिन्छ, र सूचना जोडिएपछि तपाईंको जिल्ला नजिकका ठूला भूकम्पबारे सूचित गर्न सक्छ।",
        "faq.q8": "के मेरो घर सुरक्षित छ?",
        "faq.a8": "कसरी बनाइएको छ भन्नेमा भर पर्छ। बिनाप्रबलित इँटा/ढुंगा र कमजोर (खुला) भुइँतला सबैभन्दा जोखिममा हुन्छन्। <a href=\"building.html\">घर सुरक्षित छ कि छैन जान्नुहोस्</a>।",
        "faq.q9": "घरको सबैभन्दा सुरक्षित ठाउँ कुन हो?",
        "faq.a9": "बलियो टेबलमुनि वा भित्री भित्ताको छेउ, झ्याल र गह्रौं वस्तुबाट टाढा। आधुनिक घरमा ढोकाको चौकोस बढी सुरक्षित होइन — घोप्टिनुहोस्-ओत लिनुहोस्-समाउनुहोस् नै राम्रो।",
        "faq.q10": "आपत्कालीन झोलामा के राख्ने?",
        "faq.a10": "पानी (प्रतिव्यक्ति दैनिक ४ लिटर, ३ दिनलाई), खाना, टर्च, प्राथमिक उपचार, औषधि, कागजातका प्रतिलिपि, नगद, सिठी र न्यानो लुगा। <a href=\"preparedness.html#kit\">आफ्नो झोला बनाउनुहोस्</a>।",
        "faq.q11": "म्याग्निच्युड र तीव्रता भनेको के?",
        "faq.a11": "म्याग्निच्युडले स्रोतमा निस्केको ऊर्जा नाप्छ — प्रति भूकम्प एउटा अंक। तीव्रता (मोडिफाइड मर्कली) ले कुनै ठाउँमा कति बलियो हल्लाइ महसुस भयो नाप्छ, र केन्द्र नजिक बढी हुन्छ। <a href=\"insights.html\">दुवै अन्वेषण गर्नुहोस्</a>।",
        "faq.q12": "EQ Sentry को तथ्याङ्क कहाँबाट आउँछ?",
        "faq.a12": "प्रत्यक्ष र ऐतिहासिक भूकम्प USGS Earthquake Hazards Program बाट आउँछन्। EQ Sentry जानकारीमूलक हो, आधिकारिक चेतावनी निकाय होइन — आधिकारिक राष्ट्रिय अभिलेखका लागि नेपालको राष्ट्रिय भूकम्प केन्द्र हेर्नुहोस्।",
