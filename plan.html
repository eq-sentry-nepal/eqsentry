  <style>
    .plan-row { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; margin-bottom:10px; align-items:end; }
    .plan-row .field { margin:0; }
    .plan-rm { flex:0 0 auto; width:40px; height:40px; border:1px solid var(--line-2); background:var(--surface-2); color:var(--ink-soft); border-radius:10px; cursor:pointer; font-size:1.2rem; line-height:1; }
    .plan-rm:hover { border-color:var(--accent); color:var(--accent); }
    .kit-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
    .kit-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:var(--surface); cursor:pointer; }
    .kit-item input { width:auto; margin:0; flex:0 0 auto; }
    .kit-item.on { border-color:rgba(52,211,153,.5); }
    .plan-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .refresh-due { color:var(--m3); font-size:.82rem; margin-top:8px; display:none; }
    .refresh-due.show { display:block; }
    .pp-prog-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; gap:12px; }
    .pp-prog-head b { font-size:1.02rem; }
    #progPct { font-weight:800; font-variant-numeric:tabular-nums; color:var(--accent); }
    .pp-meter { height:10px; border-radius:999px; background:var(--surface-2); border:1px solid var(--line); overflow:hidden; }
    .pp-meter i { display:block; height:100%; width:0; background:linear-gradient(90deg,#34D399,#10B981); border-radius:999px; transition:width .45s ease; }
    .pp-rules { margin:12px 0 0; padding-left:18px; color:var(--ink-soft); font-size:.9rem; }
    .pp-rules li { margin:5px 0; }
    .field textarea { width:100%; min-height:96px; resize:vertical; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:10px 12px; color:var(--ink); font:inherit; }
    .field textarea:focus { outline:none; border-color:var(--accent); }
    .pp-h3 { margin:14px 0 4px; font-size:.98rem; }
    @media (max-width:560px){ .plan-row { grid-template-columns:1fr 1fr; } .plan-row .plan-rm { grid-column:1/-1; width:100%; } }
    @media print {
      .site-header, .site-footer, #alertBar, .emergency-strip, .to-top, .a11y-fab, .plan-actions, .plan-rm, .plan-add, #planNote, .pp-prog-card { display:none !important; }
      body { background:#fff; color:#000; }
      .form-card { border:1px solid #ccc !important; box-shadow:none !important; break-inside:avoid; }
      .kit-item, .field input, .field textarea, .field { border-color:#ccc !important; }
      a[href]:after { content:""; }
    }
  </style>

<body data-page="plan">
  <header class="site-header" id="site-header"></header>
  <div id="alertBar"></div>

  <section class="page-hero section tight">
    <div class="container">
      <span class="eyebrow" data-i18n="pp.eyebrow"></span>
      <h1 data-i18n="pp.h1"></h1>
      <p class="lead" data-i18n="pp.sub"></p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width:880px">
      <div class="callout info" id="planNote" style="margin-bottom:24px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <p data-i18n="pp.privacy"></p>
      </div>

      <form id="planForm" autocomplete="off">
        <div class="form-card pp-prog-card" style="margin-bottom:18px">
          <div class="pp-prog-head"><b data-i18n="pp.prog.t"></b><span id="progPct">0%</span></div>
          <div class="pp-meter"><i id="progBar"></i></div>
          <p class="muted" id="progHint" style="margin:10px 0 0;font-size:.86rem"></p>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.mem.t"></h2>
          <p class="muted" data-i18n="pp.mem.d"></p>
          <div id="memList"></div>
          <button type="button" class="btn btn-ghost plan-add" id="memAdd" data-i18n="pp.add"></button>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.meet.t"></h2>
          <p class="muted" data-i18n="pp.meet.d"></p>
          <div class="field"><label data-i18n="pp.meet1"></label><input id="meet1" data-i18n-placeholder="pp.meet1.ph" /></div>
          <div class="field"><label data-i18n="pp.meet2"></label><input id="meet2" data-i18n-placeholder="pp.meet2.ph" /></div>
          <div class="field"><label data-i18n="pp.meet3"></label><input id="meet3" data-i18n-placeholder="pp.meet3.ph" /></div>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.comm.t"></h2>
          <h3 class="pp-h3" data-i18n="pp.oac.t"></h3>
          <p class="muted" data-i18n="pp.oac.d"></p>
          <div class="form-grid">
            <div class="field"><label data-i18n="pp.oac.name"></label><input id="oacName" /></div>
            <div class="field"><label data-i18n="pp.oac.phone"></label><input id="oacPhone" type="tel" /></div>
          </div>
          <div class="field"><label data-i18n="pp.chat"></label><input id="famChat" data-i18n-placeholder="pp.chat.ph" /></div>
          <ul class="pp-rules" data-i18n-html="pp.comm.rules"></ul>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.ice.t"></h2>
          <p class="muted" data-i18n="pp.ice.d"></p>
          <div id="iceList"></div>
          <button type="button" class="btn btn-ghost plan-add" id="iceAdd" data-i18n="pp.add"></button>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.roles.t"></h2>
          <p class="muted" data-i18n="pp.roles.d"></p>
          <div id="roleList"></div>
          <button type="button" class="btn btn-ghost plan-add" id="roleAdd" data-i18n="pp.add"></button>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.home.t"></h2>
          <p class="muted" data-i18n="pp.home.d"></p>
          <div class="form-grid">
            <div class="field"><label data-i18n="pp.home.addr"></label><input id="homeAddr" data-i18n-placeholder="pp.home.addr.ph" /></div>
            <div class="field"><label data-i18n="pp.home.gas"></label><input id="gasLoc" data-i18n-placeholder="pp.home.gas.ph" /></div>
            <div class="field"><label data-i18n="pp.home.power"></label><input id="powerLoc" data-i18n-placeholder="pp.home.power.ph" /></div>
            <div class="field"><label data-i18n="pp.home.water"></label><input id="waterLoc" data-i18n-placeholder="pp.home.water.ph" /></div>
          </div>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.near.t"></h2>
          <p class="muted" data-i18n-html="pp.near.d"></p>
          <div class="field"><label data-i18n="pp.near.open"></label><input id="nearOpen" data-i18n-placeholder="pp.near.open.ph" /></div>
          <div class="field"><label data-i18n="pp.near.hosp"></label><input id="nearHosp" data-i18n-placeholder="pp.near.hosp.ph" /></div>
          <div class="field"><label data-i18n="pp.near.help"></label><input id="nearHelp" data-i18n-placeholder="pp.near.help.ph" /></div>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.sp.t"></h2>
          <p class="muted" data-i18n="pp.sp.d"></p>
          <div class="field"><textarea id="specialNotes" data-i18n-placeholder="pp.sp.ph"></textarea></div>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.docs.t"></h2>
          <p class="muted" data-i18n="pp.docs.d"></p>
          <ul class="pp-rules" style="margin-top:0" data-i18n-html="pp.docs.tips"></ul>
          <div class="field" style="margin-top:12px"><label data-i18n="pp.docs.loc"></label><input id="docsLoc" data-i18n-placeholder="pp.docs.loc.ph" /></div>
        </div>

        <div class="form-card" style="margin-bottom:18px">
          <h2 style="margin-top:0" data-i18n="pp.kit.t"></h2>
          <p class="muted" data-i18n="pp.kit.d"></p>
          <div class="kit-list" id="kitList"></div>
          <div class="field" style="margin-top:16px;max-width:280px"><label data-i18n="pp.refresh"></label><input id="kitDate" type="date" /></div>
          <p class="refresh-due" id="refreshDue" data-i18n="pp.refresh.due"></p>
          <p class="muted" style="font-size:.86rem;margin:10px 0 0" data-i18n-html="pp.drill.hint"></p>
        </div>

        <div class="plan-actions">
          <button type="button" class="btn btn-primary" id="planSave" data-i18n="pp.save"></button>
          <button type="button" class="btn btn-ghost" id="planPrint" data-i18n="pp.print"></button>
          <button type="button" class="btn btn-ghost" id="cardPrint" data-i18n="pp.card"></button>
          <a class="btn btn-ghost" href="assets/downloads/eq-family-plan.pdf" download data-i18n="pp.dl"></a>
          <button type="button" class="btn btn-outline" id="planClear" data-i18n="pp.clear"></button>
        </div>
        <div id="walletCard" aria-hidden="true"></div>
        <p id="planStatus" class="muted" style="font-size:.86rem;margin-top:12px"></p>
      </form>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/plan.js"></script>
  <script src="assets/js/pages/wallet-card.js"></script>
</body>
</html>
