        "meta.title": "Is Your Home Safe? — EQ Sentry Nepal", "meta.desc": "How to tell if your building is earthquake-vulnerable, what a safer building looks like, and what you can do — retrofitting and the National Building Code in plain language.",
        "bs.eyebrow": "Building safety",
        "bs.h1": "Is your home safe?",
        "bs.sub": "In an earthquake, it's the building that hurts people — not the shaking itself. Knowing whether yours is vulnerable, and what to do about it, is the single biggest way to protect your family.",
        "bs.warn": "Most earthquake deaths are caused by collapsing buildings. A stronger home is worth more than any kit or app.",

        "bs.signs.t": "Warning signs your building may be vulnerable",
        "bs.signs.tag": "Red flags",
        "bs.w1": "<b>Soft / open ground floor.</b> A ground floor on thin pillars (shops, parking) carrying heavy floors above — a common cause of collapse.",
        "bs.w2": "<b>Unreinforced brick or stone.</b> Walls of brick or stone in mud or weak mortar, with no concrete bands or steel reinforcement.",
        "bs.w3": "<b>Floors added later.</b> Extra storeys built on top without strengthening the structure or foundation below.",
        "bs.w4": "<b>Heavy roof on weak walls.</b> A heavy concrete or tiled roof resting on thin, unreinforced walls.",
        "bs.w5": "<b>Existing damage.</b> Large diagonal or X-shaped cracks, leaning walls, or crumbling mortar.",
        "bs.w6": "<b>Poor construction.</b> Too little or no steel, weak concrete, or columns without proper stirrups (ties).",
        "bs.w7": "<b>Bad ground.</b> Built on a steep slope, landfill, riverbank or soft valley soil that amplifies shaking.",
        "bs.w8": "<b>Irregular shape.</b> L- or U-shaped plans, big asymmetries, or large openings close to corners.",

        "bs.safe.t": "What a safer building has",
        "bs.safe.tag": "Green flags",
        "bs.s1": "<b>A strong, connected frame.</b> Reinforced concrete with adequate steel and stirrups — or masonry properly tied with bands.",
        "bs.s2": "<b>Seismic bands.</b> Horizontal bands at plinth, sill, lintel and roof level that tie all the walls together.",
        "bs.s3": "<b>Reinforcement at corners.</b> Vertical steel at corners and around door and window openings.",
        "bs.s4": "<b>A regular, symmetric plan</b> with a light roof and a sound foundation on firm ground.",
        "bs.s5": "<b>Built to the National Building Code</b> by trained masons and engineers — the steel is never skipped.",
        "bs.s6": "<b>Secured contents.</b> Heavy furniture, water tanks, parapets and signs anchored so they can't fall.",

        "bs.do.t": "What you can do",
        "bs.do1": "<b>Get a professional assessment.</b> A licensed structural engineer can evaluate your home — especially older, masonry or soft-storey buildings.",
        "bs.do2": "<b>Retrofit a weak building.</b> Strengthening (column jacketing, adding bands/splints, bracing) can dramatically improve safety. Ask an engineer what fits your home.",
        "bs.do3": "<b>Build new homes to code.</b> Insist on a National-Building-Code design and trained masons. Don't cut the steel to save money.",
        "bs.do4": "<b>Don't add unauthorised floors</b> or remove ground-floor walls and columns.",
        "bs.do5": "<b>Fix the non-structural hazards</b> — anchor furniture, water tanks, parapets and anything that can fall on people.",
        "bs.do6": "<b>Use your municipality.</b> Most municipalities require a building permit and offer engineering guidance — use it.",

        "bs.retro.p": "Retrofitting means strengthening an existing building so it can better resist earthquakes — for example by jacketing weak columns, adding reinforced bands or steel bracing, or tying walls together. After 2015, retrofitting saved many homes that would otherwise have needed rebuilding. It is far cheaper than reconstruction and should always be designed by a qualified engineer.",

<body data-page="building">
  <header class="site-header" id="site-header"></header>
  <div id="alertBar"></div>

  <section class="page-hero section tight">
    <div class="container">
      <span class="eyebrow" data-i18n="bs.eyebrow"></span>
      <h1 style="max-width:16ch" data-i18n="bs.h1"></h1>
      <p class="lead" data-i18n="bs.sub"></p>
    </div>
  </section>

  <section class="section tight">
    <div class="container">
      <div class="callout danger reveal" style="align-items:center">

      </div>
    </div>
  </section>

  <!-- Warning signs — image carousel -->
  <section class="section" style="padding-top:8px">
    <div class="container">
      <div class="phase-row during">
        <div class="phase-head"><span class="tag" data-i18n="bs.signs.tag"></span><h3 data-i18n="bs.signs.t"></h3></div>
        <ul class="phase-src" data-phase="signs" data-art="softstory|brickwall|addedfloor|heavyroof|xcrack|weakcol|badground|lshape" hidden>
          <li data-i18n-html="bs.w1"></li>
          <li data-i18n-html="bs.w2"></li>
          <li data-i18n-html="bs.w3"></li>
          <li data-i18n-html="bs.w4"></li>

          <li data-i18n-html="bs.w7"></li>
          <li data-i18n-html="bs.w8"></li>

          <button type="button" class="pc-arrow pc-prev" data-target="signs" aria-label="Scroll left" data-i18n-aria="ui.prev">‹</button>

          <button type="button" class="pc-arrow pc-next" data-target="signs" aria-label="Scroll right" data-i18n-aria="ui.next">›</button>
        </div>
      </div>
    </div>
  </section>

      <div class="phase-row before">

        <ul class="phase-src" data-phase="safe" data-art="frame|bands|cornersteel|symmetric|code|securedtank" hidden>
          <li data-i18n-html="bs.s1"></li>
          <li data-i18n-html="bs.s2"></li>
          <li data-i18n-html="bs.s3"></li>
          <li data-i18n-html="bs.s4"></li>
          <li data-i18n-html="bs.s5"></li>
          <li data-i18n-html="bs.s6"></li>
        </ul>
        <div class="phase-carousel-wrap">
          <button type="button" class="pc-arrow pc-prev" data-target="safe" aria-label="Scroll left" data-i18n-aria="ui.prev">‹</button>

          <button type="button" class="pc-arrow pc-next" data-target="safe" aria-label="Scroll right" data-i18n-aria="ui.next">›</button>
